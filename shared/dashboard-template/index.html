<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>ai-pipes Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header { padding: 20px 24px 12px; }
    .header h1 { font-size: 24px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 14px; color: #8b949e; margin-top: 4px; }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding: 12px 24px;
      height: calc(100% - 90px - 36px);
    }
    .chart-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      position: relative;
    }
    .chart-container .chart-title {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .chart-container .chart { width: 100%; height: calc(100% - 24px); }
    .footer { padding: 8px 24px; text-align: right; font-size: 11px; color: #484f58; }
  </style>
</head>
<body>
  <div class="header">
    <!-- CUSTOMIZE: Protocol name and angle -->
    <h1>Protocol Name</h1>
    <div class="angle">Compelling angle description — what story does this data tell?</div>
  </div>
  <div class="chart-grid">
    <!-- CUSTOMIZE: Up to 4 charts. Remove containers you don't need. -->
    <div class="chart-container">
      <div class="chart-title">Chart 1 Title</div>
      <div class="chart" id="chart1"></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Chart 2 Title</div>
      <div class="chart" id="chart2"></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Chart 3 Title</div>
      <div class="chart" id="chart3"></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Chart 4 Title</div>
      <div class="chart" id="chart4"></div>
    </div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK &nbsp;|&nbsp; <a href="https://github.com/karelxfi" style="color:#484f58">github.com/karelxfi</a> &nbsp;|&nbsp; <a href="https://x.com/karelxfi" style="color:#484f58">x.com/karelxfi</a></div>
  <script>
    const CLICKHOUSE_URL = 'http://localhost:8123';
    async function queryClickHouse(sql) {
      const res = await fetch(`${CLICKHOUSE_URL}/?query=${encodeURIComponent(sql + ' FORMAT JSON')}`);
      const json = await res.json();
      return json.data;
    }
    function createChart(containerId) {
      const container = document.getElementById(containerId);
      const chart = LightweightCharts.createChart(container, {
        layout: { background: { type: 'solid', color: '#161b22' }, textColor: '#8b949e' },
        grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
        width: container.clientWidth, height: container.clientHeight,
        timeScale: { borderColor: '#30363d' },
        rightPriceScale: { borderColor: '#30363d' },
      });
      return chart;
    }
    // CUSTOMIZE: Replace with your ClickHouse queries and chart setup
    async function init() {
      // Example:
      // const data = await queryClickHouse('SELECT time, value FROM my_table ORDER BY time');
      // const chart1 = createChart('chart1');
      // const series = chart1.addSeries(LightweightCharts.LineSeries, { color: '#58a6ff' });
      // series.setData(data.map(d => ({ time: d.time, value: parseFloat(d.value) })));
    }
    init().catch(console.error);
  </script>
</body>
</html>
