<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>ai-pipes Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header {
      padding: 14px 24px 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: #58a6ff; line-height: 1.2; }
    .stat-label { font-size: 8px; color: #6e7681; text-transform: uppercase; letter-spacing: 1px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 6px 16px;
      height: calc(100% - 62px - 22px);
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      position: relative;
    }
    .chart { width: 100%; height: 100%; }
    .footer {
      padding: 2px 24px 4px;
      text-align: right;
      font-size: 9px;
      color: #484f58;
    }
    .footer a { color: #58a6ff; text-decoration: none; opacity: 0.5; }
    .footer a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <!-- CUSTOMIZE: Protocol name and angle -->
      <h1>Protocol Name</h1>
      <div class="angle">Compelling angle — what story does this data tell?</div>
    </div>
    <!-- CUSTOMIZE: Summary stats -->
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <!-- CUSTOMIZE: 4 chart panels. Adjust grid if you need 2 or 3. -->
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">
    Built with ai-pipes + SQD Pipes SDK |
    <a href="https://github.com/karelxfi">github.com/karelxfi</a> |
    <a href="https://x.com/karelxfi">x.com/karelxfi</a>
  </div>

  <script>
    // ClickHouse query helper — update DB and auth as needed
    var CH = 'http://localhost:8123';
    var DB = 'your_database';

    function query(sql) {
      return fetch(CH + '/?database=' + DB + '&user=default&password=password&query=' + encodeURIComponent(sql + ' FORMAT JSON'))
        .then(function(r) { return r.json(); })
        .then(function(j) { return j.data; });
    }

    // Standard dark theme options for ECharts
    var PALETTE = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];

    function darkOpts(title) {
      return {
        backgroundColor: 'transparent',
        title: { text: title, textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        textStyle: { color: '#8b949e', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial' },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 } },
        grid: { left: 50, right: 16, top: 36, bottom: 28 },
      };
    }

    // CHART TYPE GUIDE — pick the right chart for your data:
    //
    // Time-series counts (events per day)  → vertical bar with gradient:
    //   series: [{ type: 'bar', itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#58a6ff'},{offset:1,color:'#1f6feb'}]), borderRadius: [2,2,0,0] }, barMaxWidth: 12 }]
    //
    // Rankings (top assets, top users)     → horizontal bar:
    //   xAxis: { type: 'value' }, yAxis: { type: 'category', data: labels }
    //   series: [{ type: 'bar', label: { show: true, position: 'right' } }]
    //
    // Composition (share breakdown)        → treemap (NEVER pie/donut):
    //   series: [{ type: 'treemap', data: [{name, value, itemStyle: {color}}] }]
    //
    // Continuous over time (TVL, price)    → area chart:
    //   series: [{ type: 'line', areaStyle: { opacity: 0.3 }, smooth: true }]
    //
    // ALWAYS include legends on categorical charts

    async function init() {
      // CUSTOMIZE: Replace with your ClickHouse queries and chart setup
      //
      // Example: Summary stats
      // var totals = await query('SELECT count() as total FROM my_table');
      // var statsEl = document.getElementById('stats');
      // [{v: totals[0].total, l: 'Events'}].forEach(function(s) {
      //   var d = document.createElement('div'); d.className = 'stat';
      //   var vl = document.createElement('div'); vl.className = 'stat-value'; vl.textContent = s.v;
      //   var lb = document.createElement('div'); lb.className = 'stat-label'; lb.textContent = s.l;
      //   d.appendChild(vl); d.appendChild(lb); statsEl.appendChild(d);
      // });
      //
      // Example: Bar chart
      // var ch1 = echarts.init(document.getElementById('chart1'));
      // var data = await query('SELECT toDate(timestamp) as day, count() as n FROM my_table GROUP BY day ORDER BY day');
      // ch1.setOption(Object.assign(darkOpts('Events Per Day'), {
      //   xAxis: { type: 'category', data: data.map(d => d.day) },
      //   yAxis: { type: 'value' },
      //   series: [{ type: 'bar', data: data.map(d => parseInt(d.n)), itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#58a6ff'},{offset:1,color:'#1f6feb'}]) } }]
      // }));

      window.__DASHBOARD_READY__ = true;
    }

    init().catch(function(err) {
      console.error('Dashboard error:', err);
      var e = document.createElement('div');
      e.style.cssText = 'color:#f78166;padding:24px;font-size:14px';
      e.textContent = 'Error: ' + err.message;
      document.body.appendChild(e);
    });
  </script>
</body>
</html>
