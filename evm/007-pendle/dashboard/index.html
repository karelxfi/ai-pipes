<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Pendle Finance — Yield Trading Activity</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px; height: 675px; overflow: hidden;
    }
    .header { padding: 14px 24px 6px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 2px; }
    .stat { text-align: center; white-space: nowrap; padding: 4px 12px; background: #161b22; border-radius: 4px; }
    .stat-value { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .stat-label { font-size: 7px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat:nth-child(1) .stat-value { color: #58a6ff; }
    .stat:nth-child(2) .stat-value { color: #3fb950; }
    .stat:nth-child(3) .stat-value { color: #d2a8ff; }
    .stat:nth-child(4) .stat-value { color: #f78166; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 6px 16px; height: calc(100% - 62px - 22px); }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; position: relative; }
    .chart { width: 100%; height: 100%; }
    .footer { padding: 2px 24px 4px; text-align: right; font-size: 9px; color: #484f58; }
    .footer a { color: #484f58; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Pendle Finance — Yield Trading Activity</h1>
      <div class="angle">PT &amp; YT swap activity across Pendle markets | Ethereum Mainnet</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a></div>

<script>
var CH = 'http://localhost:8123/?user=default&password=password&database=pendle';
var COLORS = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];

function query(sql) {
  return fetch(CH, { method: 'POST', body: sql + ' FORMAT JSON' }).then(function(r) { return r.json(); }).then(function(j) { return j.data || []; });
}
function fmt(n) { if (n >= 1e6) return (n/1e6).toFixed(2)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return String(n); }
function shortAddr(a) { return a.substring(0,6) + '...' + a.substring(38); }

function buildStats(d) {
  var el = document.getElementById('stats');
  while (el.firstChild) el.removeChild(el.firstChild);
  [
    { val: fmt(+d.total), label: 'Total Swaps' },
    { val: fmt(+d.unique_traders), label: 'Traders' },
    { val: fmt(+d.unique_markets), label: 'Markets' },
    { val: d.first_ts.substring(0,10)+' \u2192 '+d.last_ts.substring(0,10), label: 'Period', style: 'font-size:11px;color:#8b949e' }
  ].forEach(function(item) {
    var s = document.createElement('div'); s.className = 'stat';
    var v = document.createElement('div'); v.className = 'stat-value';
    if (item.style) v.style.cssText = item.style;
    v.textContent = item.val;
    var l = document.createElement('div'); l.className = 'stat-label'; l.textContent = item.label;
    s.appendChild(v); s.appendChild(l); el.appendChild(s);
  });
}

async function init() {
  var stats = await query("SELECT count() as total, count(DISTINCT caller) as unique_traders, count(DISTINCT market) as unique_markets, min(timestamp) as first_ts, max(timestamp) as last_ts FROM pendle_swaps");
  buildStats(stats[0]);

  // Chart 1: Swaps per week by type
  var weekly = await query("SELECT toStartOfWeek(timestamp) as week, swap_type, count() as cnt FROM pendle_swaps GROUP BY week, swap_type ORDER BY week");
  var types = []; var typeSet = {};
  weekly.forEach(function(d) { if (!typeSet[d.swap_type]) { types.push(d.swap_type); typeSet[d.swap_type] = true; } });
  var weeks = []; var weekSet = {};
  weekly.forEach(function(d) { var w = d.week.substring(0,10); if (!weekSet[w]) { weeks.push(w); weekSet[w] = true; } });
  weeks.sort();
  var byType = {}; types.forEach(function(t) { byType[t] = {}; });
  weekly.forEach(function(d) { byType[d.swap_type][d.week.substring(0,10)] = +d.cnt; });

  echarts.init(document.getElementById('chart1')).setOption({
    title: { text: 'Swaps Per Week by Type', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
    legend: { right: 12, top: 8, textStyle: { color: '#8b949e', fontSize: 9 }, data: types },
    grid: { left: 48, right: 16, top: 40, bottom: 28 },
    xAxis: { type: 'category', data: weeks, axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } } },
    yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    series: types.map(function(t, i) { return {
      name: t, type: 'bar', stack: 'total', data: weeks.map(function(w) { return byType[t][w] || 0; }),
      itemStyle: { color: COLORS[i % COLORS.length] }
    }; })
  });

  // Chart 2: Top Markets by swap count
  var markets = await query("SELECT market, count() as cnt FROM pendle_swaps GROUP BY market ORDER BY cnt DESC LIMIT 10");
  echarts.init(document.getElementById('chart2')).setOption({
    title: { text: 'Top 10 Markets (by swap count)', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
    grid: { left: 110, right: 40, top: 36, bottom: 16 },
    xAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    yAxis: { type: 'category', data: markets.map(function(d) { return shortAddr(d.market); }).reverse(), axisLabel: { color: '#8b949e', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } } },
    series: [{ type: 'bar', data: markets.map(function(d, i) { return { value: +d.cnt, itemStyle: { color: COLORS[i % COLORS.length] } }; }).reverse(),
      label: { show: true, position: 'right', color: '#8b949e', fontSize: 9, formatter: '{c}' } }]
  });

  // Chart 3: Swap type breakdown (treemap)
  var typeBreakdown = await query("SELECT swap_type, count() as cnt FROM pendle_swaps GROUP BY swap_type ORDER BY cnt DESC");
  echarts.init(document.getElementById('chart3')).setOption({
    title: { text: 'Swap Type Distribution', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
    series: [{ type: 'treemap', left: 12, right: 12, top: 36, bottom: 12,
      data: typeBreakdown.map(function(d, i) { return { name: d.swap_type, value: +d.cnt, itemStyle: { color: COLORS[i % COLORS.length] } }; }),
      label: { color: '#e6edf3', fontSize: 12, formatter: function(p) { return p.name + '\n' + fmt(p.value); } },
      breadcrumb: { show: false }
    }]
  });

  // Chart 4: Top traders by swap count
  var traders = await query("SELECT caller, count() as cnt FROM pendle_swaps GROUP BY caller ORDER BY cnt DESC LIMIT 8");
  echarts.init(document.getElementById('chart4')).setOption({
    title: { text: 'Top Traders (by swap count)', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
    grid: { left: 110, right: 40, top: 36, bottom: 16 },
    xAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    yAxis: { type: 'category', data: traders.map(function(d) { return shortAddr(d.caller); }).reverse(), axisLabel: { color: '#8b949e', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } } },
    series: [{ type: 'bar', data: traders.map(function(d, i) { return { value: +d.cnt, itemStyle: { color: COLORS[i % COLORS.length] } }; }).reverse(),
      label: { show: true, position: 'right', color: '#8b949e', fontSize: 9, formatter: '{c}' } }]
  });

  window.__DASHBOARD_READY__ = true;
}
init().catch(console.error);
</script>
</body>
</html>
