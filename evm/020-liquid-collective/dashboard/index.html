<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Liquid Collective — LsETH Oracle Reports & Staking Flow</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; width: 1200px; height: 675px; overflow: hidden; }
    .header { padding: 14px 24px 6px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: #58a6ff; line-height: 1.2; }
    .stat-label { font-size: 8px; color: #6e7681; text-transform: uppercase; letter-spacing: 1px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 6px 16px; height: calc(100% - 62px - 22px); }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; position: relative; }
    .chart { width: 100%; height: 100%; }
    .footer { padding: 2px 24px 4px; text-align: right; font-size: 9px; color: #484f58; }
    .footer a { color: #58a6ff; text-decoration: none; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Liquid Collective — LsETH Oracle Reports & Staking Flow</h1>
      <div class="angle">Daily oracle reports, validator growth, and deposit activity on enterprise-grade ETH staking | Ethereum Mainnet</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a></div>

  <script>
    var CH = 'http://localhost:8123';
    var DB = 'liquid_collective';
    var T = 'lc_events';

    function q(sql) {
      return fetch(CH + '/?database=' + DB + '&user=default&password=password&query=' + encodeURIComponent(sql + ' FORMAT JSON'))
        .then(function(r) { return r.json(); })
        .then(function(j) { return j.data; });
    }

    var PALETTE = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];
    var typeColors = { deposit: '#3fb950', oracle_report: '#58a6ff', rewards: '#d2a8ff', validator_funded: '#f0883e' };

    function darkOpts(title) {
      return {
        backgroundColor: 'transparent',
        title: { text: title, textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        textStyle: { color: '#8b949e' },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 } },
        grid: { left: 60, right: 16, top: 36, bottom: 28 },
      };
    }

    function fmt(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(Math.round(n));
    }

    async function init() {
      var totals = await q("SELECT count() as total, countIf(event_type='deposit') as deposits, countIf(event_type='rewards') as rewards, uniq(depositor) as depositors, min(timestamp) as min_ts, max(timestamp) as max_ts FROM " + T);
      // Get latest validator count from oracle_report
      var latestValidator = await q("SELECT validator_count FROM " + T + " WHERE event_type = 'validator_funded' AND validator_count > 0 ORDER BY block_number DESC LIMIT 1");
      var st = totals[0];
      var valCount = latestValidator.length > 0 ? parseInt(latestValidator[0].validator_count) : 0;
      var period = (st.min_ts || '').slice(0, 10) + ' \u2192 ' + (st.max_ts || '').slice(0, 10);
      var statsEl = document.getElementById('stats');
      [
        {v: fmt(parseInt(st.total)), l: 'Total Events'},
        {v: fmt(parseInt(st.deposits)), l: 'Deposits'},
        {v: fmt(parseInt(st.rewards)), l: 'Reward Events'},
        {v: fmt(valCount), l: 'Validators'},
        {v: period, l: 'Period', small: true}
      ].forEach(function(s) {
        var d = document.createElement('div'); d.className = 'stat';
        var vl = document.createElement('div'); vl.className = 'stat-value';
        if (s.small) vl.style.fontSize = '11px';
        vl.textContent = s.v;
        var lb = document.createElement('div'); lb.className = 'stat-label'; lb.textContent = s.l;
        d.appendChild(vl); d.appendChild(lb); statsEl.appendChild(d);
      });

      // Chart 1: Validator Count Over Time (from validator_funded events)
      var valHistory = await q("SELECT toDate(timestamp) as day, max(validator_count) as vals FROM " + T + " WHERE event_type = 'validator_funded' AND validator_count > 0 GROUP BY day ORDER BY day");
      var ch1 = echarts.init(document.getElementById('chart1'));
      ch1.setOption(Object.assign(darkOpts('Validator Count (from Oracle Reports)'), {
        xAxis: { type: 'category', data: valHistory.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', min: 'dataMin', axisLabel: { color: '#6e7681', fontSize: 9, formatter: function(v){return fmt(v);} }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Validators: <b>' + fmt(p[0].value) + '</b>'; } },
        series: [{
          type: 'line', symbol: 'none', lineStyle: { width: 2, color: '#58a6ff' },
          areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(88,166,255,0.3)'},{offset:1,color:'rgba(88,166,255,0.02)'}]) },
          data: valHistory.map(function(d){return parseInt(d.vals);})
        }],
      }));

      // Chart 2: Daily Deposits Count — bar chart
      var dailyDeposits = await q("SELECT toDate(timestamp) as day, count() as n FROM " + T + " WHERE event_type = 'deposit' GROUP BY day ORDER BY day");
      var ch2 = echarts.init(document.getElementById('chart2'));
      ch2.setOption(Object.assign(darkOpts('Daily Deposit Count'), {
        xAxis: { type: 'category', data: dailyDeposits.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Deposits: <b>' + p[0].value + '</b>'; } },
        series: [{
          type: 'bar', data: dailyDeposits.map(function(d){return parseInt(d.n);}),
          itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#3fb950'},{offset:1,color:'#238636'}]), borderRadius: [2,2,0,0] },
          barMaxWidth: 12
        }],
      }));

      // Chart 3: TVL Growth from Rewards (new_total_balance over time, in ETH)
      var tvlHistory = await q("SELECT toDate(timestamp) as day, max(toFloat64(new_total_balance) / 1e18) as tvl_eth FROM " + T + " WHERE event_type = 'rewards' AND toFloat64(new_total_balance) > 0 GROUP BY day ORDER BY day");
      var ch3 = echarts.init(document.getElementById('chart3'));
      ch3.setOption(Object.assign(darkOpts('Total Underlying Balance (ETH, from Rewards)'), {
        xAxis: { type: 'category', data: tvlHistory.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', min: 'dataMin', axisLabel: { color: '#6e7681', fontSize: 9, formatter: function(v){return fmt(v);} }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Total Balance: <b>' + fmt(p[0].value) + ' ETH</b>'; } },
        series: [{
          type: 'line', symbol: 'none', lineStyle: { width: 2, color: '#d2a8ff' },
          areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(210,168,255,0.3)'},{offset:1,color:'rgba(210,168,255,0.02)'}]) },
          data: tvlHistory.map(function(d){return Math.round(parseFloat(d.tvl_eth));})
        }],
      }));

      // Chart 4: Event Type Distribution — treemap
      var dist = await q("SELECT event_type, count() as n FROM " + T + " GROUP BY event_type ORDER BY n DESC");
      var ch4 = echarts.init(document.getElementById('chart4'));
      ch4.setOption({
        backgroundColor: 'transparent',
        title: { text: 'Event Type Distribution', textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 } },
        series: [{
          type: 'treemap', top: 32, left: 8, right: 8, bottom: 8, roam: false, nodeClick: false, breadcrumb: { show: false },
          label: { show: true, color: '#e6edf3', fontSize: 13, fontWeight: 'bold', formatter: function(p) { return p.name + '\n' + fmt(p.value); } },
          itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 },
          data: dist.map(function(d) { return { value: parseInt(d.n), name: d.event_type, itemStyle: { color: typeColors[d.event_type] || PALETTE[0] } }; }),
        }],
      });

      window.__DASHBOARD_READY__ = true;
    }

    init().catch(function(err) {
      console.error('Dashboard error:', err);
      var e = document.createElement('div');
      e.style.cssText = 'color:#f78166;padding:24px;font-size:14px';
      e.textContent = 'Error: ' + err.message;
      document.body.appendChild(e);
    });
  </script>
</body>
</html>
