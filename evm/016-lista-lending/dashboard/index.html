<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Lista Lending (Moolah) — Isolated Market Activity on BSC</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header {
      padding: 14px 24px 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 2px; align-items: stretch; }
    .stat { text-align: center; white-space: nowrap; padding: 4px 12px; background: #161b22; border-radius: 4px; }
    .stat-value { font-size: 15px; font-weight: 700; color: #e6edf3; line-height: 1.3; }
    .stat-label { font-size: 7px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat:first-child .stat-value { color: #58a6ff; }
    .stat:nth-child(2) .stat-value { color: #3fb950; }
    .stat:nth-child(3) .stat-value { color: #d2a8ff; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 6px 16px;
      height: calc(100% - 62px - 22px);
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      position: relative;
    }
    .chart { width: 100%; height: 100%; }
    .footer {
      padding: 2px 24px 4px;
      text-align: right;
      font-size: 9px;
      color: #484f58;
    }
    .footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Lista Lending (Moolah) — Isolated Market Activity</h1>
      <div class="angle">BSC's Morpho Blue fork: supply, borrow, collateral, and flash loan dynamics | Binance Smart Chain</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="total-events">—</div><div class="stat-label">Lending Events</div></div>
      <div class="stat"><div class="stat-value" id="total-markets">—</div><div class="stat-label">Markets</div></div>
      <div class="stat"><div class="stat-value" id="total-flash">—</div><div class="stat-label">Flash Loans</div></div>
      <div class="stat"><div class="stat-value" id="period">—</div><div class="stat-label">Period</div></div>
    </div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart-daily"></div></div>
    <div class="panel"><div class="chart" id="chart-types"></div></div>
    <div class="panel"><div class="chart" id="chart-markets"></div></div>
    <div class="panel"><div class="chart" id="chart-interest"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a></div>

  <script>
    var CH = 'http://localhost:8123/?user=default&password=password&database=lista_lending';

    function q(sql) {
      return fetch(CH, { method: 'POST', body: sql + ' FORMAT JSONEachRow' })
        .then(function(r) { return r.text(); })
        .then(function(t) { return t.trim() ? t.trim().split('\n').map(function(l) { return JSON.parse(l); }) : []; });
    }
    function fmt(n) {
      if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return n.toFixed(0);
    }
    var colors = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff'];

    Promise.all([
      q('SELECT count() as cnt FROM moolah_events'),
      q('SELECT count(DISTINCT market_id) as cnt FROM moolah_events'),
      q('SELECT count() as cnt FROM moolah_flash_loans'),
      q("SELECT min(timestamp) as mn, max(timestamp) as mx FROM moolah_events"),
      // Daily events by type
      q("SELECT toDate(timestamp) as day, event_type, count() as cnt FROM moolah_events GROUP BY day, event_type ORDER BY day"),
      // Event type breakdown
      q("SELECT event_type, count() as cnt FROM moolah_events GROUP BY event_type ORDER BY cnt DESC"),
      // Top markets by activity
      q("SELECT market_id, count() as cnt FROM moolah_events GROUP BY market_id ORDER BY cnt DESC LIMIT 8"),
      // Daily interest accruals
      q("SELECT toDate(timestamp) as day, count() as cnt FROM moolah_interest GROUP BY day ORDER BY day"),
    ]).then(function(results) {
      document.getElementById('total-events').textContent = fmt(Number(results[0][0]?.cnt || 0));
      document.getElementById('total-markets').textContent = fmt(Number(results[1][0]?.cnt || 0));
      document.getElementById('total-flash').textContent = fmt(Number(results[2][0]?.cnt || 0));
      var mn = results[3][0] ? results[3][0].mn.slice(0, 10) : '—';
      var mx = results[3][0] ? results[3][0].mx.slice(0, 10) : '—';
      document.getElementById('period').textContent = mn + ' → ' + mx;

      // Chart 1: Daily events stacked by type
      var dailyData = results[4];
      var days = []; var daySet = new Set();
      dailyData.forEach(function(d) { daySet.add(d.day); });
      days = Array.from(daySet).sort();
      var types = ['Borrow', 'SupplyCollateral', 'Repay', 'WithdrawCollateral', 'Supply', 'Withdraw'];
      var typeMap = {};
      types.forEach(function(t) { typeMap[t] = {}; });
      dailyData.forEach(function(d) { if (typeMap[d.event_type]) typeMap[d.event_type][d.day] = Number(d.cnt); });

      var ch1 = echarts.init(document.getElementById('chart-daily'));
      ch1.setOption({
        title: { text: 'Daily Lending Activity by Type', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
        tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
        legend: { top: 8, right: 12, textStyle: { color: '#8b949e', fontSize: 9 } },
        grid: { left: 50, right: 16, top: 40, bottom: 28 },
        xAxis: { type: 'category', data: days, axisLabel: { color: '#8b949e', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } } },
        yAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
        series: types.map(function(t, i) {
          return {
            name: t, type: 'bar', stack: 'all',
            data: days.map(function(d) { return typeMap[t][d] || 0; }),
            itemStyle: { color: colors[i % colors.length] }
          };
        })
      });

      // Chart 2: Event type breakdown (horizontal bar)
      var typeBreakdown = results[5];
      var ch2 = echarts.init(document.getElementById('chart-types'));
      ch2.setOption({
        title: { text: 'Event Type Distribution', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
        tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
        grid: { left: 120, right: 50, top: 36, bottom: 12 },
        xAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
        yAxis: { type: 'category', data: typeBreakdown.map(function(d) { return d.event_type; }).reverse(), axisLabel: { color: '#8b949e', fontSize: 10 } },
        series: [{
          type: 'bar',
          data: typeBreakdown.map(function(d, i) { return { value: Number(d.cnt), itemStyle: { color: colors[i % colors.length] } }; }).reverse(),
          label: { show: true, position: 'right', color: '#8b949e', fontSize: 9 }
        }]
      });

      // Chart 3: Top markets by activity
      var topMarkets = results[6];
      var ch3 = echarts.init(document.getElementById('chart-markets'));
      ch3.setOption({
        title: { text: 'Top Markets by Event Count', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
        tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
        grid: { left: 100, right: 50, top: 36, bottom: 12 },
        xAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
        yAxis: { type: 'category', data: topMarkets.map(function(d) { return d.market_id.slice(0, 10) + '...' + d.market_id.slice(-4); }).reverse(), axisLabel: { color: '#8b949e', fontSize: 9 } },
        series: [{
          type: 'bar',
          data: topMarkets.map(function(d) { return Number(d.cnt); }).reverse(),
          itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#d2a8ff' }, { offset: 1, color: '#8b5cf6' }]) },
          label: { show: true, position: 'right', color: '#8b949e', fontSize: 9 }
        }]
      });

      // Chart 4: Daily interest accruals
      var interestData = results[7];
      var ch4 = echarts.init(document.getElementById('chart-interest'));
      ch4.setOption({
        title: { text: 'Daily Interest Accrual Events', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
        tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
        grid: { left: 50, right: 16, top: 40, bottom: 28 },
        xAxis: { type: 'category', data: interestData.map(function(d) { return d.day; }), axisLabel: { color: '#8b949e', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } } },
        yAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
        series: [{
          type: 'bar',
          data: interestData.map(function(d) { return Number(d.cnt); }),
          itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#f0883e' }, { offset: 1, color: '#d29922' }]) }
        }]
      });

      window.__DASHBOARD_READY__ = true;
    });
  </script>
</body>
</html>
