<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>FLUID LITE — Vault Pulse</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#ccc;font-family:'Consolas','SF Mono','Source Code Pro','JetBrains Mono',monospace;font-size:11px;line-height:1.3}
.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;gap:1px;width:1200px;height:675px;margin:0 auto;background:#1a1a1a}
.header{grid-column:1/-1;background:#000;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a1a1a}
.header-left{display:flex;align-items:baseline;gap:12px}
.header-title{font-size:13px;color:#4A7AB5;font-weight:bold;letter-spacing:1px}
.header-sub{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:0.8px}
.stats{display:flex;gap:16px}
.stat{text-align:right}
.stat-val{font-size:16px;color:#fff;font-feature-settings:'tnum'}
.stat-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:0.8px}
.panel{background:#0a0a0a;padding:8px;overflow:hidden}
.panel-title{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.chart{width:100%;height:100%}
.footer{grid-column:1/-1;background:#000;padding:4px 12px;font-size:9px;color:#444;display:flex;justify-content:space-between;border-top:1px solid #1a1a1a}
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl th{text-align:left;color:#666;font-weight:normal;text-transform:uppercase;font-size:9px;letter-spacing:0.5px;padding:2px 4px;border-bottom:1px solid #1a1a1a}
.tbl td{padding:2px 4px;color:#ccc}
.tbl td.num{text-align:right;font-feature-settings:'tnum'}
.deposit{color:#3D7A6B}.withdraw{color:#8B3A3A}
</style>
</head>
<body>
<div class="grid">
  <div class="header">
    <div class="header-left">
      <span class="header-title">FLUID LITE — VAULT PULSE</span>
      <span class="header-sub" id="period">Loading...</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="totalEvents">—</div><div class="stat-label">Events</div></div>
      <div class="stat"><div class="stat-val" id="totalDeposits">—</div><div class="stat-label">Deposits</div></div>
      <div class="stat"><div class="stat-val" id="totalWithdraws">—</div><div class="stat-label">Withdraws</div></div>
      <div class="stat"><div class="stat-val" id="priceUpdates">—</div><div class="stat-label">Price Updates</div></div>
    </div>
  </div>

  <div class="panel" style="height:240px">
    <div id="chart-exchange" class="chart"></div>
  </div>
  <div class="panel" style="height:240px">
    <div id="chart-flows" class="chart"></div>
  </div>
  <div class="panel" style="height:240px">
    <div id="chart-depositors" class="chart"></div>
  </div>
  <div class="panel" style="height:240px">
    <div id="chart-ops" class="chart"></div>
  </div>

  <div class="footer">
    <span>Built with ai-pipes + SQD Pipes SDK | github.com/karelxfi | x.com/karelxfi</span>
    <span id="lastUpdate"></span>
  </div>
</div>

<script>
var CH = 'http://localhost:8123/?user=default&password=password&database=fluid_lite&default_format=JSONEachRow';
var PALETTE = ['#1E3A5F','#2B4F7E','#1A3050','#3D6494','#4A7AB5','#2E5480','#5A8ABF','#1F4470','#3B6A9E','#274D73'];

function chQuery(sql) {
  return fetch(CH, {method:'POST', body:sql}).then(function(r){return r.text()}).then(function(t){
    if(!t.trim()) return [];
    return t.trim().split('\n').map(function(l){return JSON.parse(l)});
  });
}

function terminalOpts(title) {
  return {
    backgroundColor:'transparent',
    title:{text:title.toUpperCase(),textStyle:{color:'#666',fontSize:10,fontWeight:'normal',fontFamily:'Consolas, SF Mono, monospace'},left:8,top:4},
    textStyle:{color:'#666',fontFamily:'Consolas, SF Mono, Source Code Pro, monospace'},
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas, monospace'},padding:[4,8]},
    grid:{left:48,right:8,top:28,bottom:24},
    animation:false
  };
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

async function init() {
  // Header stats
  var statsP = Promise.all([
    chQuery("SELECT count() as c FROM vault_events"),
    chQuery("SELECT count() as c FROM vault_events WHERE event_type='deposit'"),
    chQuery("SELECT count() as c FROM vault_events WHERE event_type='withdraw'"),
    chQuery("SELECT count() as c FROM exchange_prices"),
    chQuery("SELECT min(timestamp) as mn, max(timestamp) as mx FROM vault_events")
  ]);

  // Exchange price time-series — divide by 1e18 to get human-readable rate
  var priceP = chQuery("SELECT toDate(timestamp) as d, vault, avg(toFloat64OrZero(price_after) / 1e18) as avg_price FROM exchange_prices WHERE price_after != '' GROUP BY d, vault ORDER BY d");

  // Weekly deposit/withdraw counts (aggregate by week for cleaner chart)
  var flowsP = chQuery("SELECT toStartOfWeek(timestamp) as d, event_type, count() as cnt FROM vault_events GROUP BY d, event_type ORDER BY d");

  // Top depositors (by count)
  var depositorP = chQuery("SELECT owner, count() as cnt FROM vault_events WHERE event_type='deposit' GROUP BY owner ORDER BY cnt DESC LIMIT 10");

  // Strategy operations
  var opsP = chQuery("SELECT op_type, count() as cnt FROM strategy_ops GROUP BY op_type ORDER BY cnt DESC");

  var stats = await statsP;
  document.getElementById('totalEvents').textContent = formatNum(Number(stats[0][0]?.c||0));
  document.getElementById('totalDeposits').textContent = formatNum(Number(stats[1][0]?.c||0));
  document.getElementById('totalWithdraws').textContent = formatNum(Number(stats[2][0]?.c||0));
  document.getElementById('priceUpdates').textContent = formatNum(Number(stats[3][0]?.c||0));
  if (stats[4][0]) {
    var mn = stats[4][0].mn.substring(0,10);
    var mx = stats[4][0].mx.substring(0,10);
    document.getElementById('period').textContent = mn + ' → ' + mx;
  }
  document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toISOString().substring(0,16);

  // 1. Exchange Price Chart (line)
  var priceData = await priceP;
  var vaults = {};
  priceData.forEach(function(r){
    if(!vaults[r.vault]) vaults[r.vault]={dates:[],prices:[]};
    vaults[r.vault].dates.push(r.d);
    vaults[r.vault].prices.push(Number(r.avg_price));
  });

  var priceChart = echarts.init(document.getElementById('chart-exchange'));
  var priceSeries = [];
  var priceColors = {'iETHv2':'#2B4F7E','fLiteUSD':'#4A7AB5'};
  var allDates = [];
  Object.keys(vaults).forEach(function(v,i){
    allDates = allDates.concat(vaults[v].dates);
    priceSeries.push({
      name:v, type:'line', data:vaults[v].dates.map(function(d,j){return [d,vaults[v].prices[j]]}),
      lineStyle:{width:1.5,color:priceColors[v]||PALETTE[i]}, showSymbol:true, symbolSize:3,
      itemStyle:{color:priceColors[v]||PALETTE[i]},
      areaStyle:{opacity:0.06,color:priceColors[v]||PALETTE[i]}
    });
  });
  var opts = terminalOpts('Exchange Rate Growth');
  opts.xAxis = {type:'time',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},splitLine:{show:false}};
  opts.yAxis = {type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace',formatter:function(v){return v.toFixed(3)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}},scale:true};
  opts.series = priceSeries;
  opts.legend = {show:true,data:Object.keys(vaults),textStyle:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},top:4,right:8,itemWidth:12,itemHeight:2};
  priceChart.setOption(opts);

  // 2. Daily Flows (bar chart)
  var flowData = await flowsP;
  var flowDates = [...new Set(flowData.map(function(r){return r.d}))].sort();
  var depMap = {}, wdMap = {};
  flowData.forEach(function(r){
    if(r.event_type==='deposit') depMap[r.d]=Number(r.cnt);
    if(r.event_type==='withdraw') wdMap[r.d]=Number(r.cnt);
  });

  var flowChart = echarts.init(document.getElementById('chart-flows'));
  var fOpts = terminalOpts('Weekly Capital Flows (Event Count)');
  fOpts.xAxis = {type:'category',data:flowDates,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace',interval:Math.max(0,Math.floor(flowDates.length/8)),rotate:30,formatter:function(v){return v.substring(2,10)}}};
  fOpts.yAxis = {type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}};
  fOpts.series = [
    {name:'Deposits',type:'bar',stack:'flow',data:flowDates.map(function(d){return depMap[d]||0}),itemStyle:{color:'#3D7A6B'},barMaxWidth:10},
    {name:'Withdrawals',type:'bar',stack:'flow',data:flowDates.map(function(d){return -(wdMap[d]||0)}),itemStyle:{color:'#8B3A3A'},barMaxWidth:10}
  ];
  fOpts.legend = {show:true,data:['Deposits','Withdrawals'],textStyle:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},top:4,right:8,itemWidth:12,itemHeight:2};
  fOpts.tooltip.formatter = function(params){
    var lines = params.map(function(p){return p.seriesName+': '+Math.abs(p.value)});
    return params[0].axisValue+'<br/>'+lines.join('<br/>');
  };
  flowChart.setOption(fOpts);

  // 3. Top Depositors (horizontal bar)
  var depositors = await depositorP;
  var depChart = echarts.init(document.getElementById('chart-depositors'));
  var dOpts = terminalOpts('Top Depositors (by Count)');
  var depLabels = depositors.map(function(r){return r.owner.substring(0,6)+'..'+r.owner.substring(38)}).reverse();
  var depValues = depositors.map(function(r){return Number(r.cnt)}).reverse();
  dOpts.grid = {left:90,right:40,top:28,bottom:12};
  dOpts.xAxis = {type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}};
  dOpts.yAxis = {type:'category',data:depLabels,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'}};
  dOpts.series = [{type:'bar',data:depValues,itemStyle:{color:'#2B4F7E'},barMaxWidth:10,label:{show:true,position:'right',color:'#ccc',fontSize:9,fontFamily:'Consolas, monospace'}}];
  depChart.setOption(dOpts);

  // 4. Strategy Operations (horizontal bar)
  var ops = await opsP;
  var opsChart = echarts.init(document.getElementById('chart-ops'));
  if (ops.length > 0) {
    var oOpts = terminalOpts('Strategy Operations');
    var opLabels = ops.map(function(r){return r.op_type}).reverse();
    var opValues = ops.map(function(r){return Number(r.cnt)}).reverse();
    oOpts.grid = {left:100,right:40,top:28,bottom:12};
    oOpts.xAxis = {type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}};
    oOpts.yAxis = {type:'category',data:opLabels,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'}};
    oOpts.series = [{type:'bar',data:opValues,itemStyle:{color:function(p){var c={'refinance':'#2B4F7E','collect_revenue':'#3D7A6B','pull_funds':'#4A7AB5','push_funds':'#2E5480'};return c[opLabels[p.dataIndex]]||PALETTE[p.dataIndex%PALETTE.length]}},barMaxWidth:10,label:{show:true,position:'right',color:'#ccc',fontSize:9,fontFamily:'Consolas, monospace'}}];
    opsChart.setOption(oOpts);
  } else {
    // Show empty state with vault event breakdown instead
    var vaultBreak = await chQuery("SELECT vault, event_type, count() as cnt FROM vault_events GROUP BY vault, event_type ORDER BY cnt DESC");
    var oOpts = terminalOpts('Event Breakdown by Vault');
    var obLabels = vaultBreak.map(function(r){return r.vault+' / '+r.event_type}).reverse();
    var obValues = vaultBreak.map(function(r){return Number(r.cnt)}).reverse();
    oOpts.grid = {left:110,right:40,top:28,bottom:12};
    oOpts.xAxis = {type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}};
    oOpts.yAxis = {type:'category',data:obLabels,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas, monospace'}};
    oOpts.series = [{type:'bar',data:obValues.map(function(v,i){return {value:v,itemStyle:{color:PALETTE[i%PALETTE.length]}}}),barMaxWidth:10,label:{show:true,position:'right',color:'#ccc',fontSize:9,fontFamily:'Consolas, monospace'}}];
    opsChart.setOption(oOpts);
  }

  window.__DASHBOARD_READY__ = true;
}

init().catch(function(e){console.error(e)});
</script>
</body>
</html>
