<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Aave V3 Liquidation Cascades</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header { padding: 20px 24px 12px; }
    .header h1 { font-size: 24px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 14px; color: #8b949e; margin-top: 4px; }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding: 12px 24px;
      height: calc(100% - 90px - 36px);
    }
    .chart-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      position: relative;
    }
    .chart-container .chart-title {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .chart-container .chart { width: 100%; height: calc(100% - 24px); }
    .footer { padding: 8px 24px; text-align: right; font-size: 11px; color: #484f58; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Aave V3 Liquidation Cascades</h1>
    <div class="angle">Tracking when one liquidation triggers others during market stress</div>
  </div>
  <div class="chart-grid">
    <div class="chart-container">
      <div class="chart-title">Liquidation Volume Over Time (debt covered)</div>
      <div class="chart" id="chart1"></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Top Collateral Assets Liquidated</div>
      <div class="chart" id="chart2"></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Liquidation Count Per Day</div>
      <div class="chart" id="chart3"></div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Top Liquidators by Volume</div>
      <div class="chart" id="chart4"></div>
    </div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK</div>
  <script>
    const CLICKHOUSE_URL = 'http://localhost:8123';
    const DB = 'aave_v3_pool';
    const TABLE = 'aave_v_3_pool_liquidation_call';

    async function queryClickHouse(sql) {
      const res = await fetch(`${CLICKHOUSE_URL}/?database=${DB}&query=${encodeURIComponent(sql + ' FORMAT JSON')}`);
      const json = await res.json();
      return json.data;
    }

    function createChart(containerId) {
      const container = document.getElementById(containerId);
      const chart = LightweightCharts.createChart(container, {
        layout: { background: { type: 'solid', color: '#161b22' }, textColor: '#8b949e' },
        grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
        width: container.clientWidth, height: container.clientHeight,
        timeScale: { borderColor: '#30363d' },
        rightPriceScale: { borderColor: '#30363d' },
      });
      return chart;
    }

    const COLORS = ['#58a6ff', '#f78166', '#3fb950', '#d2a8ff', '#f0883e', '#a5d6ff', '#7ee787', '#d29922'];

    async function init() {
      // Chart 1: Liquidation volume over time (daily sum of debt_to_cover as float)
      const volumeData = await queryClickHouse(`
        SELECT toDate(timestamp) as day,
               toFloat64(sum(debt_to_cover)) / 1e18 as volume
        FROM ${TABLE}
        GROUP BY day ORDER BY day
      `);
      const chart1 = createChart('chart1');
      const lineSeries = chart1.addLineSeries({ color: '#58a6ff', lineWidth: 2 });
      lineSeries.setData(volumeData.map(d => ({ time: d.day, value: parseFloat(d.volume) })));

      // Chart 2: Top collateral assets (histogram-style using line series with histogram mode)
      const topCollateral = await queryClickHouse(`
        SELECT collateral_asset,
               count() as liq_count
        FROM ${TABLE}
        GROUP BY collateral_asset
        ORDER BY liq_count DESC
        LIMIT 10
      `);
      const chart2 = createChart('chart2');
      const histSeries = chart2.addHistogramSeries({});
      histSeries.setData(topCollateral.map((d, i) => ({
        time: `2023-01-${String(i + 1).padStart(2, '0')}`,
        value: parseInt(d.liq_count),
        color: COLORS[i % COLORS.length],
      })));
      // Disable time scale labels for this bar chart
      chart2.timeScale().applyOptions({ visible: false });

      // Chart 3: Liquidation count per day (area chart)
      const countData = await queryClickHouse(`
        SELECT toDate(timestamp) as day,
               count() as liquidations
        FROM ${TABLE}
        GROUP BY day ORDER BY day
      `);
      const chart3 = createChart('chart3');
      const areaSeries = chart3.addAreaSeries({
        topColor: 'rgba(59, 130, 246, 0.4)',
        bottomColor: 'rgba(59, 130, 246, 0.0)',
        lineColor: '#3b82f6',
        lineWidth: 2,
      });
      areaSeries.setData(countData.map(d => ({ time: d.day, value: parseInt(d.liquidations) })));

      // Chart 4: Top liquidators by volume (histogram-style)
      const topLiquidators = await queryClickHouse(`
        SELECT liquidator,
               toFloat64(sum(debt_to_cover)) / 1e18 as total_volume
        FROM ${TABLE}
        GROUP BY liquidator
        ORDER BY total_volume DESC
        LIMIT 10
      `);
      const chart4 = createChart('chart4');
      const barSeries = chart4.addHistogramSeries({});
      barSeries.setData(topLiquidators.map((d, i) => ({
        time: `2023-01-${String(i + 1).padStart(2, '0')}`,
        value: parseFloat(d.total_volume),
        color: COLORS[i % COLORS.length],
      })));
      chart4.timeScale().applyOptions({ visible: false });
    }

    init().catch(console.error);
  </script>
</body>
</html>
