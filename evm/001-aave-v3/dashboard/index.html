<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Aave V3 Liquidation Cascades</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header {
      padding: 14px 24px 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: #58a6ff; line-height: 1.2; }
    .stat-label { font-size: 8px; color: #6e7681; text-transform: uppercase; letter-spacing: 1px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 6px 16px;
      height: calc(100% - 62px - 22px);
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      position: relative;
    }
    .chart { width: 100%; height: 100%; }
    .footer {
      padding: 2px 24px 4px;
      text-align: right;
      font-size: 9px;
      color: #484f58;
    }
    .footer a { color: #58a6ff; text-decoration: none; opacity: 0.5; }
    .footer a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Aave V3 Liquidation Cascades</h1>
      <div class="angle">When liquidations trigger others during market stress | Ethereum Mainnet</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">
    Built with ai-pipes + SQD Pipes SDK |
    <a href="https://github.com/karelxfi">github.com/karelxfi</a> |
    <a href="https://x.com/karelxfi">x.com/karelxfi</a>
  </div>

  <script>
    var CH = 'http://localhost:8123';
    var DB = 'aave_v3_pool';
    var T = 'aave_v_3_pool_liquidation_call';

    function q(sql) {
      return fetch(CH + '/?database=' + DB + '&user=default&password=password&query=' + encodeURIComponent(sql + ' FORMAT JSON'))
        .then(function(r) { return r.json(); })
        .then(function(j) { return j.data; });
    }

    var TOKENS = {
      '0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2': 'WETH',
      '0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48': 'USDC',
      '0xdac17f958d2ee523a2206206994597c13d831ec7': 'USDT',
      '0x2260fac5e5542a773aa44fbcfedf7c193bc2c599': 'WBTC',
      '0x7f39c581f595b53c5cb19bd0b3f8da6c935e2ca0': 'wstETH',
      '0x6b175474e89094c44da98b954eedeac495271d0f': 'DAI',
      '0xae78736cd615f374d3085123a210448e74fc6393': 'rETH',
      '0xbe9895146f7af43049ca1c1ae358b0541ea49704': 'cbETH',
      '0x514910771af9ca656af840dff83e8264ecf986ca': 'LINK',
      '0xae7ab96520de3a18e5e111b5eaab095312d7fe84': 'stETH',
      '0x5f98805a4e8be255a32880fdec7f6728c6568ba0': 'LUSD',
      '0x853d955acef822db058eb8505911ed77f175b99e': 'FRAX',
      '0x40d16fc0246ad3160ccc09b8d0d3a2cd28ae6c2f': 'GHO',
    };
    function tok(a) { return TOKENS[a.toLowerCase()] || (a.slice(0,6) + '..' + a.slice(-4)); }

    var PALETTE = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];

    function darkOpts(title) {
      return {
        backgroundColor: 'transparent',
        title: { text: title, textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        textStyle: { color: '#8b949e', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial' },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 } },
        grid: { left: 50, right: 16, top: 36, bottom: 28 },
      };
    }

    async function init() {
      // Stats
      var totals = await q('SELECT count() as total, uniq(user) as users, uniq(collateral_asset) as assets FROM ' + T);
      var st = totals[0];
      var statsEl = document.getElementById('stats');
      [{v: st.total, l: 'Liquidations'}, {v: st.users, l: 'Users Hit'}, {v: st.assets, l: 'Assets'}].forEach(function(s) {
        var d = document.createElement('div'); d.className = 'stat';
        var vl = document.createElement('div'); vl.className = 'stat-value'; vl.textContent = s.v;
        var lb = document.createElement('div'); lb.className = 'stat-label'; lb.textContent = s.l;
        d.appendChild(vl); d.appendChild(lb); statsEl.appendChild(d);
      });

      // Chart 1: Liquidations per day — bar chart
      var daily = await q('SELECT toDate(timestamp) as day, count() as n FROM ' + T + ' GROUP BY day ORDER BY day');
      var ch1 = echarts.init(document.getElementById('chart1'));
      ch1.setOption(Object.assign(darkOpts('Liquidations Per Day'), {
        xAxis: { type: 'category', data: daily.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        series: [{ type: 'bar', data: daily.map(function(d){return parseInt(d.n);}), itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#58a6ff'},{offset:1,color:'#1f6feb'}]), borderRadius: [2,2,0,0] }, barMaxWidth: 12 }],
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Liquidations: <b>' + p[0].value + '</b>'; } },
      }));

      // Chart 2: Top collateral assets — horizontal bar
      var coll = await q('SELECT collateral_asset, count() as n FROM ' + T + ' GROUP BY collateral_asset ORDER BY n DESC LIMIT 8');
      coll.reverse();
      var ch2 = echarts.init(document.getElementById('chart2'));
      ch2.setOption(Object.assign(darkOpts('Collateral Assets Seized'), {
        grid: { left: 60, right: 40, top: 36, bottom: 16 },
        xAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        yAxis: { type: 'category', data: coll.map(function(d){return tok(d.collateral_asset);}), axisLabel: { color: '#e6edf3', fontSize: 10 }, axisLine: { lineStyle: { color: '#30363d' } } },
        series: [{ type: 'bar', data: coll.map(function(d,i){return { value: parseInt(d.n), itemStyle: { color: PALETTE[i % PALETTE.length], borderRadius: [0,3,3,0] } };}), barMaxWidth: 18, label: { show: true, position: 'right', color: '#8b949e', fontSize: 10, formatter: '{c}' } }],
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + ': <b>' + p[0].value + '</b> liquidations'; } },
      }));

      // Chart 3: Cascade detection — blocks with multiple liquidations
      var cascades = await q("SELECT toDate(timestamp) as day, sum(block_liq_count) as cascade_liqs, countIf(block_liq_count >= 3) as severe FROM (SELECT block_number, min(timestamp) as timestamp, count() as block_liq_count FROM " + T + " GROUP BY block_number HAVING block_liq_count >= 2) GROUP BY day ORDER BY day");
      var ch3 = echarts.init(document.getElementById('chart3'));
      ch3.setOption(Object.assign(darkOpts('Cascade Events (2+ liquidations per block)'), {
        xAxis: { type: 'category', data: cascades.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        series: [
          { name: 'Cascade liquidations', type: 'bar', data: cascades.map(function(d){return parseInt(d.cascade_liqs);}), itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f78166'},{offset:1,color:'#da3633'}]), borderRadius: [2,2,0,0] }, barMaxWidth: 12 },
        ],
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Cascade liquidations: <b>' + p[0].value + '</b>'; } },
      }));

      // Chart 4: Debt assets — treemap (proportional area, no pie charts)
      var debt = await q('SELECT debt_asset, count() as n FROM ' + T + ' GROUP BY debt_asset ORDER BY n DESC LIMIT 8');
      var ch4 = echarts.init(document.getElementById('chart4'));
      ch4.setOption({
        backgroundColor: 'transparent',
        title: { text: 'Debt Assets Repaid', textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 }, formatter: function(p) { return p.name + ': <b>' + p.value + '</b> liquidations'; } },
        series: [{
          type: 'treemap',
          top: 32, left: 8, right: 8, bottom: 8,
          roam: false,
          nodeClick: false,
          breadcrumb: { show: false },
          label: { show: true, color: '#e6edf3', fontSize: 12, fontWeight: 'bold', formatter: function(p) { return p.name + '\n' + p.value; } },
          itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 },
          levels: [{ itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 } }],
          data: debt.map(function(d, i) {
            return { value: parseInt(d.n), name: tok(d.debt_asset), itemStyle: { color: PALETTE[i % PALETTE.length] } };
          }),
        }],
      });

      window.__DASHBOARD_READY__ = true;
    }

    init().catch(function(err) {
      console.error('Dashboard error:', err);
      var e = document.createElement('div');
      e.style.cssText = 'color:#f78166;padding:24px;font-size:14px';
      e.textContent = 'Error: ' + err.message;
      document.body.appendChild(e);
    });
  </script>
</body>
</html>
