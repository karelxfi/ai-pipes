<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Lido stETH Rebase Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header {
      padding: 14px 24px 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: #58a6ff; line-height: 1.2; }
    .stat-label { font-size: 8px; color: #6e7681; text-transform: uppercase; letter-spacing: 1px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 6px 16px;
      height: calc(100% - 62px - 22px);
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      position: relative;
    }
    .chart { width: 100%; height: 100%; }
    .footer {
      padding: 2px 24px 4px;
      text-align: right;
      font-size: 9px;
      color: #484f58;
    }
    .footer a { color: #58a6ff; text-decoration: none; opacity: 0.5; }
    .footer a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Lido stETH Rebase Tracker</h1>
      <div class="angle">stETH/ETH exchange rate evolution from TokenRebased events | Ethereum Mainnet</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">
    Built with ai-pipes + SQD Pipes SDK |
    <a href="https://github.com/karelxfi">github.com/karelxfi</a> |
    <a href="https://x.com/karelxfi">x.com/karelxfi</a>
  </div>

  <script>
    var CH = 'http://localhost:8123';
    var DB = 'lido';
    var T = 'lido_token_rebased';

    function q(sql) {
      return fetch(CH + '/?database=' + DB + '&user=default&password=password&query=' + encodeURIComponent(sql + ' FORMAT JSON'))
        .then(function(r) { return r.json(); })
        .then(function(j) { return j.data; });
    }

    function fmtETH(wei) {
      return (Number(wei) / 1e18).toFixed(2);
    }

    function fmtRate(ether, shares) {
      return (Number(ether) / Number(shares)).toFixed(6);
    }

    function fmtNum(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(n);
    }

    function darkOpts(title) {
      return {
        backgroundColor: 'transparent',
        title: { text: title, textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        textStyle: { color: '#8b949e', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial' },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 } },
        grid: { left: 56, right: 16, top: 36, bottom: 28 },
      };
    }

    async function init() {
      // Summary stats
      var totalCount = await q('SELECT count() as total FROM ' + T);
      var latest = await q(
        'SELECT toFloat64(post_total_ether) / toFloat64(post_total_shares) as latest_rate, ' +
        'toFloat64(post_total_ether) / 1e18 as total_eth ' +
        'FROM ' + T + ' ORDER BY block_number DESC LIMIT 1'
      );
      var dateRange = await q('SELECT min(toDate(timestamp)) as from_date, max(toDate(timestamp)) as to_date FROM ' + T);
      var dr = dateRange[0] || {};
      var st = Object.assign({}, totalCount[0] || {}, latest[0] || {});
      var total = totalCount[0]?.total || '0';

      var statsEl = document.getElementById('stats');
      [
        {v: total, l: 'Total Rebases'},
        {v: Number(st.latest_rate || 0).toFixed(6), l: 'Current Rate'},
        {v: fmtNum(Math.round(Number(st.total_eth || 0))) + ' ETH', l: 'Total Pooled'},
        {v: (dr.from_date || '?') + ' → ' + (dr.to_date || '?'), l: 'Period'},
      ].forEach(function(s) {
        var d = document.createElement('div'); d.className = 'stat';
        var vl = document.createElement('div'); vl.className = 'stat-value'; vl.textContent = s.v;
        var lb = document.createElement('div'); lb.className = 'stat-label'; lb.textContent = s.l;
        d.appendChild(vl); d.appendChild(lb); statsEl.appendChild(d);
      });

      // Chart 1: stETH/ETH Exchange Rate Over Time (line/area)
      var rates = await q(
        'SELECT toDate(timestamp) as day, ' +
        'avg(toFloat64(post_total_ether) / toFloat64(post_total_shares)) as rate ' +
        'FROM ' + T + ' GROUP BY day ORDER BY day'
      );
      var ch1 = echarts.init(document.getElementById('chart1'));
      ch1.setOption(Object.assign(darkOpts('stETH/ETH Exchange Rate'), {
        xAxis: {
          type: 'category',
          data: rates.map(function(d) { return d.day; }),
          axisLabel: { color: '#6e7681', fontSize: 9 },
          axisLine: { lineStyle: { color: '#30363d' } },
          splitLine: { show: false },
        },
        yAxis: {
          type: 'value',
          min: function(v) { return (v.min - 0.0005).toFixed(4); },
          axisLabel: { color: '#6e7681', fontSize: 9, formatter: function(v) { return v.toFixed(4); } },
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#21262d' } },
        },
        series: [{
          type: 'line',
          data: rates.map(function(d) { return Number(d.rate); }),
          smooth: true,
          showSymbol: false,
          lineStyle: { color: '#3fb950', width: 2 },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(63,185,80,0.3)' },
              { offset: 1, color: 'rgba(63,185,80,0.02)' },
            ]),
          },
        }],
        tooltip: {
          trigger: 'axis',
          formatter: function(p) { return p[0].axisValue + '<br/>Rate: <b>' + Number(p[0].value).toFixed(6) + '</b> ETH/stETH'; },
        },
      }));

      // Chart 2: Total Pooled ETH Over Time (area chart — TVL growth)
      var tvl = await q(
        'SELECT toDate(timestamp) as day, ' +
        'max(toFloat64(post_total_ether) / 1e18) as total_eth ' +
        'FROM ' + T + ' GROUP BY day ORDER BY day'
      );
      var ch2 = echarts.init(document.getElementById('chart2'));
      ch2.setOption(Object.assign(darkOpts('Total Pooled ETH (TVL)'), {
        xAxis: {
          type: 'category',
          data: tvl.map(function(d) { return d.day; }),
          axisLabel: { color: '#6e7681', fontSize: 9 },
          axisLine: { lineStyle: { color: '#30363d' } },
          splitLine: { show: false },
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#6e7681', fontSize: 9, formatter: function(v) { return fmtNum(Math.round(v)); } },
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#21262d' } },
        },
        series: [{
          type: 'line',
          data: tvl.map(function(d) { return Math.round(Number(d.total_eth)); }),
          smooth: true,
          showSymbol: false,
          lineStyle: { color: '#58a6ff', width: 2 },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(88,166,255,0.3)' },
              { offset: 1, color: 'rgba(88,166,255,0.02)' },
            ]),
          },
        }],
        tooltip: {
          trigger: 'axis',
          formatter: function(p) { return p[0].axisValue + '<br/>Pooled: <b>' + fmtNum(p[0].value) + ' ETH</b>'; },
        },
      }));

      // Chart 3: Rebase Frequency — rebases per week (bar chart)
      var weekly = await q(
        'SELECT toMonday(timestamp) as week, count() as n FROM ' + T + ' GROUP BY week ORDER BY week'
      );
      var ch3 = echarts.init(document.getElementById('chart3'));
      ch3.setOption(Object.assign(darkOpts('Rebases Per Week'), {
        xAxis: {
          type: 'category',
          data: weekly.map(function(d) { return d.week; }),
          axisLabel: { color: '#6e7681', fontSize: 9 },
          axisLine: { lineStyle: { color: '#30363d' } },
          splitLine: { show: false },
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#6e7681', fontSize: 9 },
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#21262d' } },
        },
        series: [{
          type: 'bar',
          data: weekly.map(function(d) { return parseInt(d.n); }),
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#d2a8ff' },
              { offset: 1, color: '#8957e5' },
            ]),
            borderRadius: [2, 2, 0, 0],
          },
          barMaxWidth: 12,
        }],
        tooltip: {
          trigger: 'axis',
          formatter: function(p) { return 'Week of ' + p[0].axisValue + '<br/>Rebases: <b>' + p[0].value + '</b>'; },
        },
      }));

      // Chart 4: Fee Shares Minted Per Rebase (bar chart)
      var fees = await q(
        'SELECT toDate(timestamp) as day, ' +
        'sum(toFloat64(shares_minted_as_fees) / 1e18) as fee_shares ' +
        'FROM ' + T + ' GROUP BY day ORDER BY day'
      );
      var ch4 = echarts.init(document.getElementById('chart4'));
      ch4.setOption(Object.assign(darkOpts('Fee Shares Minted Per Day (stETH)'), {
        xAxis: {
          type: 'category',
          data: fees.map(function(d) { return d.day; }),
          axisLabel: { color: '#6e7681', fontSize: 9 },
          axisLine: { lineStyle: { color: '#30363d' } },
          splitLine: { show: false },
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#6e7681', fontSize: 9, formatter: function(v) { return fmtNum(Math.round(v)); } },
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#21262d' } },
        },
        series: [{
          type: 'bar',
          data: fees.map(function(d) { return Number(Number(d.fee_shares).toFixed(2)); }),
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#f78166' },
              { offset: 1, color: '#da3633' },
            ]),
            borderRadius: [2, 2, 0, 0],
          },
          barMaxWidth: 12,
        }],
        tooltip: {
          trigger: 'axis',
          formatter: function(p) { return p[0].axisValue + '<br/>Fee shares: <b>' + Number(p[0].value).toFixed(2) + ' stETH</b>'; },
        },
      }));

      window.__DASHBOARD_READY__ = true;
    }

    init().catch(function(err) {
      console.error('Dashboard error:', err);
      var e = document.createElement('div');
      e.style.cssText = 'color:#f78166;padding:24px;font-size:14px';
      e.textContent = 'Error: ' + err.message;
      document.body.appendChild(e);
    });
  </script>
</body>
</html>
