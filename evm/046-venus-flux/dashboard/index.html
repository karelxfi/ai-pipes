<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Venus Flux — Unified Liquidity Pulse</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #ccc;
  font-family: 'Consolas', 'SF Mono', 'Source Code Pro', 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.3;
  width: 1200px;
  min-height: 675px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-bottom: 1px solid #1a1a1a;
  background: #0a0a0a;
}
.header-left { display: flex; align-items: baseline; gap: 12px; }
.header-title {
  font-size: 12px;
  color: #4A7AB5;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-weight: normal;
}
.header-sub { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.stats {
  display: flex;
  gap: 20px;
  padding: 6px 10px;
  border-bottom: 1px solid #1a1a1a;
  background: #0a0a0a;
}
.stat { display: flex; flex-direction: column; }
.stat-value { font-size: 16px; color: #fff; font-feature-settings: 'tnum'; }
.stat-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0;
  height: calc(675px - 60px);
}
.panel {
  border: 1px solid #1a1a1a;
  padding: 0;
  background: #0a0a0a;
  position: relative;
}
.chart { width: 100%; height: 100%; }
.footer {
  padding: 4px 10px;
  font-size: 9px;
  color: #444;
  text-align: center;
  border-top: 1px solid #1a1a1a;
}
.footer a { color: #4A7AB5; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Venus Flux — Unified Liquidity Pulse</span>
    <span class="header-sub">BSC · Fluid Liquidity Hub</span>
  </div>
  <div class="header-sub" id="period"></div>
</div>

<div class="stats" id="stats-bar">
  <div class="stat"><span class="stat-value" id="total-ops">—</span><span class="stat-label">Total Operations</span></div>
  <div class="stat"><span class="stat-value" id="unique-users">—</span><span class="stat-label">Unique Users</span></div>
  <div class="stat"><span class="stat-value" id="top-token">—</span><span class="stat-label">Top Token</span></div>
  <div class="stat"><span class="stat-value" id="supply-count">—</span><span class="stat-label">Supplies</span></div>
  <div class="stat"><span class="stat-value" id="borrow-count">—</span><span class="stat-label">Borrows</span></div>
</div>

<div class="grid">
  <div class="panel"><div class="chart" id="chart-daily"></div></div>
  <div class="panel"><div class="chart" id="chart-tokens"></div></div>
  <div class="panel"><div class="chart" id="chart-types"></div></div>
  <div class="panel"><div class="chart" id="chart-users"></div></div>
</div>

<div class="footer">
  Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a>
</div>

<script>
var CH = 'http://localhost:8123/?user=default&password=password&database=venus_flux';
var PALETTE = ['#1E3A5F','#2B4F7E','#1A3050','#3D6494','#4A7AB5','#2E5480','#5A8ABF','#1F4470','#3B6A9E','#274D73'];

function query(sql) {
  return fetch(CH, { method: 'POST', body: sql + ' FORMAT JSON' })
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.data; });
}

function termOpts(title) {
  return {
    backgroundColor: 'transparent',
    title: { text: title.toUpperCase(), textStyle: { color: '#666', fontSize: 10, fontWeight: 'normal', fontFamily: 'Consolas, SF Mono, monospace' }, left: 8, top: 4 },
    textStyle: { color: '#666', fontFamily: 'Consolas, SF Mono, Source Code Pro, monospace' },
    tooltip: { backgroundColor: '#1a1a1a', borderColor: '#333', textStyle: { color: '#ccc', fontSize: 10, fontFamily: 'Consolas, monospace' }, padding: [4, 8] },
    grid: { left: 48, right: 8, top: 28, bottom: 24 },
    animation: false
  };
}

function fmtNum(n) {
  return Number(n).toLocaleString('en-US');
}

// 1. Stats
Promise.all([
  query("SELECT count() c FROM liquidity_ops"),
  query("SELECT count(distinct user) c FROM liquidity_ops"),
  query("SELECT token_label, count() c FROM liquidity_ops GROUP BY token_label ORDER BY c DESC LIMIT 1"),
  query("SELECT countIf(op_type IN ('supply','supply+borrow','supply+repay')) s, countIf(op_type IN ('borrow','supply+borrow','withdraw+borrow')) b FROM liquidity_ops"),
  query("SELECT min(timestamp) mn, max(timestamp) mx FROM liquidity_ops"),
]).then(function(r) {
  document.getElementById('total-ops').textContent = fmtNum(r[0][0].c);
  document.getElementById('unique-users').textContent = fmtNum(r[1][0].c);
  document.getElementById('top-token').textContent = r[2][0].token_label;
  document.getElementById('supply-count').textContent = fmtNum(r[3][0].s);
  document.getElementById('borrow-count').textContent = fmtNum(r[3][0].b);
  document.getElementById('period').textContent = r[4][0].mn.substring(0,10) + ' → ' + r[4][0].mx.substring(0,10);
});

// 2. Daily ops bar chart
query("SELECT toDate(timestamp) d, count() c FROM liquidity_ops GROUP BY d ORDER BY d").then(function(data) {
  var ch = echarts.init(document.getElementById('chart-daily'));
  var opts = termOpts('daily operations');
  opts.xAxis = { type: 'category', data: data.map(function(r){return r.d;}), axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}, splitLine:{show:false} };
  opts.yAxis = { type: 'value', axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}, splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}} };
  opts.series = [{ type: 'bar', data: data.map(function(r){return Number(r.c);}), itemStyle: { color: '#2B4F7E' }, barMaxWidth: 24 }];
  opts.tooltip.trigger = 'axis';
  ch.setOption(opts);
});

// 3. Token breakdown horizontal bar
query("SELECT token_label, count() c FROM liquidity_ops GROUP BY token_label ORDER BY c DESC LIMIT 8").then(function(data) {
  var ch = echarts.init(document.getElementById('chart-tokens'));
  var opts = termOpts('operations by token');
  opts.grid = { left: 60, right: 48, top: 28, bottom: 8 };
  opts.yAxis = { type: 'category', data: data.map(function(r){return r.token_label;}).reverse(), axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}, splitLine:{show:false} };
  opts.xAxis = { type: 'value', axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}, splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}} };
  opts.series = [{ type: 'bar', data: data.map(function(r){return Number(r.c);}).reverse(), itemStyle: { color: function(p){ return PALETTE[p.dataIndex % PALETTE.length]; } }, barMaxWidth: 14, label: { show: true, position: 'right', color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(p){ return fmtNum(p.value); } } }];
  ch.setOption(opts);
});

// 4. Op types treemap
query("SELECT op_type, count() c FROM liquidity_ops GROUP BY op_type ORDER BY c DESC").then(function(data) {
  var ch = echarts.init(document.getElementById('chart-types'));
  var opts = termOpts('operation type breakdown');
  opts.grid = undefined;
  var total = data.reduce(function(a,r){return a+Number(r.c);},0);
  opts.series = [{
    type: 'treemap',
    data: data.map(function(r,i){ return { name: r.op_type + ' (' + (100*Number(r.c)/total).toFixed(1) + '%)', value: Number(r.c), itemStyle: { color: PALETTE[i % PALETTE.length] } }; }),
    label: { color: '#ccc', fontSize: 10, fontFamily: 'Consolas, monospace', fontWeight: 'normal' },
    breadcrumb: { show: false },
    itemStyle: { borderColor: '#000', borderWidth: 1, gapWidth: 1 },
    left: 8, right: 8, top: 28, bottom: 8,
    roam: false
  }];
  ch.setOption(opts);
});

// 5. Top users horizontal bar
query("SELECT user_label, count() c FROM liquidity_ops GROUP BY user_label ORDER BY c DESC LIMIT 8").then(function(data) {
  var ch = echarts.init(document.getElementById('chart-users'));
  var opts = termOpts('top users / protocols');
  opts.grid = { left: 100, right: 48, top: 28, bottom: 8 };
  opts.yAxis = { type: 'category', data: data.map(function(r){return r.user_label;}).reverse(), axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}, splitLine:{show:false} };
  opts.xAxis = { type: 'value', axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}, splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}} };
  opts.series = [{ type: 'bar', data: data.map(function(r){return Number(r.c);}).reverse(), itemStyle: { color: function(p){ return PALETTE[p.dataIndex % PALETTE.length]; } }, barMaxWidth: 14, label: { show: true, position: 'right', color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(p){ return fmtNum(p.value); } } }];
  ch.setOption(opts);
});

// Mark ready for screenshot
setTimeout(function() { window.__DASHBOARD_READY__ = true; }, 3000);
</script>
</body>
</html>
