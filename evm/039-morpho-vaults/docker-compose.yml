services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.6-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: metamorpho_vaults
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-cors.xml:/etc/clickhouse-server/config.d/cors.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse-data:
