<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>LIQUITY V1 — Trove Lifecycle</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #ccc; font-family: 'Consolas','SF Mono','Source Code Pro',monospace; font-size: 11px; line-height: 1.3; width: 1200px; height: 675px; overflow: hidden; }
    .header { padding: 8px 12px 4px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #1a1a1a; }
    .header-left h1 { font-size: 11px; font-weight: normal; color: #4A7AB5; text-transform: uppercase; letter-spacing: 0.8px; }
    .header-left .angle { font-size: 10px; color: #666; margin-top: 1px; }
    .stats { display: flex; gap: 16px; }
    .stat { text-align: right; }
    .stat-value { font-size: 16px; font-weight: normal; color: #fff; font-family: 'Consolas','SF Mono',monospace; font-feature-settings: 'tnum'; }
    .stat-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: calc(675px - 48px - 18px); }
    .panel { border: 1px solid #1a1a1a; padding: 8px; background: #0a0a0a; }
    .chart { width: 100%; height: 100%; }
    .footer { padding: 3px 12px; font-size: 9px; color: #444; text-align: center; border-top: 1px solid #1a1a1a; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>LIQUITY V1 — Trove Lifecycle on Ethereum</h1>
      <div class="angle">TroveUpdated, liquidations, and redemptions on the immutable CDP protocol</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="totalEvents">—</div><div class="stat-label">Events</div></div>
      <div class="stat"><div class="stat-value" id="liquidations">—</div><div class="stat-label">Liquidations</div></div>
      <div class="stat"><div class="stat-value" id="redemptions">—</div><div class="stat-label">Redemptions</div></div>
      <div class="stat"><div class="stat-value" id="period">—</div><div class="stat-label">Period</div></div>
    </div>
  </div>
  <div class="grid">
    <div class="panel"><div id="chart1" class="chart"></div></div>
    <div class="panel"><div id="chart2" class="chart"></div></div>
    <div class="panel"><div id="chart3" class="chart"></div></div>
    <div class="panel"><div id="chart4" class="chart"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | github.com/karelxfi | x.com/karelxfi</div>
  <script>
    var CH = 'http://localhost:8123/?user=default&password=password&database=liquity_v1&default_format=JSON';
    var PALETTE = ['#1E3A5F','#2B4F7E','#1A3050','#3D6494','#4A7AB5','#2E5480','#5A8ABF','#1F4470','#3B6A9E','#274D73'];
    var TYPE_COLORS = {TroveUpdated:'#2B4F7E',TroveLiquidated:'#FF433D',Redemption:'#4AF6C3',Liquidation:'#8B3A3A'};
    function fmt(n) { return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(Math.round(n)); }
    function q(sql) { return fetch(CH, { method: 'POST', body: sql }).then(function(r){return r.json()}).then(function(j){return j.data}); }
    function tOpts(t) { return { backgroundColor:'transparent', title:{text:t.toUpperCase(),textStyle:{color:'#666',fontSize:10,fontWeight:'normal',fontFamily:'Consolas,SF Mono,monospace'},left:8,top:4}, textStyle:{color:'#666',fontFamily:'Consolas,SF Mono,monospace'}, tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8]}, grid:{left:56,right:12,top:28,bottom:28}, animation:false }; }

    Promise.all([
      q("SELECT toStartOfMonth(timestamp) as month, event_type, count() as n FROM trove_events GROUP BY month, event_type ORDER BY month"),
      q("SELECT event_type, count() as n FROM trove_events GROUP BY event_type ORDER BY n DESC"),
      q("SELECT operation, count() as n FROM trove_events WHERE event_type = 'TroveUpdated' GROUP BY operation ORDER BY n DESC"),
      q("SELECT toStartOfMonth(timestamp) as month, round(sum(debt_lusd)) as total_debt, round(sum(coll_eth)) as total_coll FROM trove_events WHERE event_type = 'TroveLiquidated' GROUP BY month ORDER BY month"),
      q("SELECT count() as cnt, countIf(event_type='TroveLiquidated') as liqs, countIf(event_type='Redemption') as reds, min(timestamp) as min_ts, max(timestamp) as max_ts FROM trove_events"),
    ]).then(function(R) {
      var monthlyByType = R[0], typeDist = R[1], opDist = R[2], monthlyLiqs = R[3], stats = R[4][0];

      document.getElementById('totalEvents').textContent = fmt(Number(stats.cnt));
      document.getElementById('liquidations').textContent = fmt(Number(stats.liqs));
      document.getElementById('redemptions').textContent = fmt(Number(stats.reds));
      document.getElementById('period').textContent = stats.min_ts.slice(0,10) + ' \u2192 ' + stats.max_ts.slice(0,10);

      // Chart 1: Monthly events stacked by type
      var months = [...new Set(monthlyByType.map(function(d){return d.month}))];
      var types = ['TroveUpdated','TroveLiquidated','Redemption','Liquidation'];
      var s1 = {};
      types.forEach(function(t){s1[t]={}});
      monthlyByType.forEach(function(d){if(s1[d.event_type])s1[d.event_type][d.month]=Number(d.n)});
      var c1 = echarts.init(document.getElementById('chart1'));
      c1.setOption(Object.assign(tOpts('Monthly Events by Type'), {
        legend:{data:types,textStyle:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'},right:8,top:4,itemWidth:10,itemHeight:8},
        xAxis:{type:'category',data:months,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(0,7)}},splitLine:{show:false}},
        yAxis:{axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
        series:types.map(function(t){return{name:t,type:'bar',stack:'events',data:months.map(function(m){return s1[t][m]||0}),itemStyle:{color:TYPE_COLORS[t]},barMaxWidth:12}})
      }));

      // Chart 2: Event type treemap
      var c2 = echarts.init(document.getElementById('chart2'));
      c2.setOption(Object.assign(tOpts('Event Type Distribution'), {
        grid:undefined,
        series:[{type:'treemap',data:typeDist.map(function(d,i){return{name:d.event_type,value:Number(d.n),itemStyle:{color:TYPE_COLORS[d.event_type]||PALETTE[i]}}}),label:{color:'#ccc',fontSize:11,fontFamily:'Consolas,monospace',formatter:function(p){return p.name+'\n'+fmt(p.value)}},breadcrumb:{show:false},top:28,left:8,right:8,bottom:8}]
      }));

      // Chart 3: TroveUpdated operations breakdown
      var c3 = echarts.init(document.getElementById('chart3'));
      var opLabels = opDist.map(function(d){return d.operation}).reverse();
      var opCounts = opDist.map(function(d){return Number(d.n)}).reverse();
      c3.setOption(Object.assign(tOpts('TroveUpdated Operations'), {
        grid:{left:120,right:48,top:28,bottom:12},
        xAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
        yAxis:{type:'category',data:opLabels,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}},
        series:[{type:'bar',data:opCounts,itemStyle:{color:function(p){return PALETTE[p.dataIndex%PALETTE.length]}},barMaxWidth:14,label:{show:true,position:'right',formatter:function(p){return fmt(p.value)},color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}}]
      }));

      // Chart 4: Monthly liquidation volume (ETH)
      var c4 = echarts.init(document.getElementById('chart4'));
      c4.setOption(Object.assign(tOpts('Monthly Liquidated Collateral (ETH)'), {
        xAxis:{type:'category',data:monthlyLiqs.map(function(d){return d.month}),axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(0,7)}},splitLine:{show:false}},
        yAxis:{axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)+' ETH'}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
        series:[{type:'bar',data:monthlyLiqs.map(function(d){return Number(d.total_coll)}),itemStyle:{color:'#FF433D'},barMaxWidth:12}]
      }));

      window.__DASHBOARD_READY__ = true;
    });
  </script>
</body>
</html>
