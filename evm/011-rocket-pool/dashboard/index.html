<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Rocket Pool — rETH Mint &amp; Burn Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; width: 1200px; height: 675px; overflow: hidden; }
    .header { padding: 14px 24px 6px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 2px; }
    .stat { text-align: center; white-space: nowrap; padding: 4px 12px; background: #161b22; border-radius: 4px; }
    .stat-value { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .stat-label { font-size: 7px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat:nth-child(1) .stat-value { color: #58a6ff; }
    .stat:nth-child(2) .stat-value { color: #3fb950; }
    .stat:nth-child(3) .stat-value { color: #d2a8ff; }
    .stat:nth-child(4) .stat-value { color: #f78166; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 6px 16px; height: calc(100% - 62px - 22px); }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; position: relative; }
    .chart { width: 100%; height: 100%; }
    .footer { padding: 2px 24px 4px; text-align: right; font-size: 9px; color: #484f58; }
    .footer a { color: #484f58; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Rocket Pool — rETH Mint &amp; Burn Tracker</h1>
      <div class="angle">Staking deposits &amp; withdrawals with implied exchange rate | Ethereum Mainnet</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a></div>
<script>
var CH = 'http://localhost:8123/?user=default&password=password&database=rocket_pool';
var COLORS = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];

function query(sql) { return fetch(CH, { method: 'POST', body: sql + ' FORMAT JSON' }).then(function(r){return r.json()}).then(function(j){return j.data||[]}); }
function fmt(n) { if(n>=1e6) return (n/1e6).toFixed(2)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return String(n); }
function shortAddr(a) { return a.substring(0,6)+'..'+a.substring(38); }

function buildStats(d) {
  var el = document.getElementById('stats');
  while(el.firstChild) el.removeChild(el.firstChild);
  [{val:fmt(+d.total),label:'Total Events'},{val:fmt(+d.mints),label:'Mints'},{val:fmt(+d.burns),label:'Burns'},{val:fmt(+d.users),label:'Unique Users'},{val:d.first_ts.substring(0,10)+' \u2192 '+d.last_ts.substring(0,10),label:'Period',style:'font-size:11px;color:#8b949e'}].forEach(function(item){
    var s=document.createElement('div');s.className='stat';
    var v=document.createElement('div');v.className='stat-value';if(item.style)v.style.cssText=item.style;v.textContent=item.val;
    var l=document.createElement('div');l.className='stat-label';l.textContent=item.label;
    s.appendChild(v);s.appendChild(l);el.appendChild(s);
  });
}

async function init() {
  var stats = await query("SELECT count() as total, countIf(event_type='mint') as mints, countIf(event_type='burn') as burns, count(DISTINCT user) as users, min(timestamp) as first_ts, max(timestamp) as last_ts FROM reth_flows");
  buildStats(stats[0]);

  // Chart 1: Mints vs Burns per week
  var weekly = await query("SELECT toStartOfWeek(timestamp) as week, event_type, count() as cnt FROM reth_flows GROUP BY week, event_type ORDER BY week");
  var weeks = []; var wkSet = {};
  weekly.forEach(function(d){var w=d.week.substring(0,10);if(!wkSet[w]){weeks.push(w);wkSet[w]=true;}});
  weeks.sort();
  var mintData = {}; var burnData = {};
  weekly.forEach(function(d){var w=d.week.substring(0,10); if(d.event_type==='mint') mintData[w]=+d.cnt; else burnData[w]=+d.cnt;});

  echarts.init(document.getElementById('chart1')).setOption({
    title:{text:'rETH Mints & Burns Per Week',left:12,top:8,textStyle:{color:'#e6edf3',fontSize:13}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3'}},
    legend:{right:12,top:8,textStyle:{color:'#8b949e',fontSize:10},data:['Mints','Burns']},
    grid:{left:48,right:16,top:40,bottom:28},
    xAxis:{type:'category',data:weeks,axisLabel:{color:'#6e7681',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis:{type:'value',axisLabel:{color:'#6e7681',fontSize:9},splitLine:{lineStyle:{color:'#21262d'}}},
    series:[
      {name:'Mints',type:'bar',data:weeks.map(function(w){return mintData[w]||0;}),itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#3fb950'},{offset:1,color:'#238636'}])}},
      {name:'Burns',type:'bar',data:weeks.map(function(w){return burnData[w]||0;}),itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f78166'},{offset:1,color:'#da3633'}])}}
    ]
  });

  // Chart 2: Implied rETH/ETH exchange rate over time (eth_amount / reth_amount for mints)
  var rateData = await query("SELECT toStartOfWeek(timestamp) as week, avg(eth_amount / reth_amount) as rate FROM reth_flows WHERE event_type = 'mint' AND reth_amount > 0 GROUP BY week ORDER BY week");
  echarts.init(document.getElementById('chart2')).setOption({
    title:{text:'Implied rETH/ETH Rate (from mints)',left:12,top:8,textStyle:{color:'#e6edf3',fontSize:13}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3'},valueFormatter:function(v){return v.toFixed(6);}},
    grid:{left:56,right:16,top:36,bottom:28},
    xAxis:{type:'category',data:rateData.map(function(d){return d.week.substring(0,10);}),axisLabel:{color:'#6e7681',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis:{type:'value',min:'dataMin',axisLabel:{color:'#6e7681',fontSize:9},splitLine:{lineStyle:{color:'#21262d'}}},
    series:[{type:'line',data:rateData.map(function(d){return +d.rate;}),areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(88,166,255,0.4)'},{offset:1,color:'rgba(88,166,255,0.05)'}])},lineStyle:{color:'#58a6ff',width:2},symbol:'none'}]
  });

  // Chart 3: ETH volume per week (mints in green area, burns in red area)
  var volData = await query("SELECT toStartOfWeek(timestamp) as week, event_type, sum(eth_amount / 1000000000000000000) as eth_vol FROM reth_flows GROUP BY week, event_type ORDER BY week");
  var mintVol = {}; var burnVol = {};
  volData.forEach(function(d){var w=d.week.substring(0,10); if(d.event_type==='mint') mintVol[w]=+d.eth_vol; else burnVol[w]=+d.eth_vol;});

  echarts.init(document.getElementById('chart3')).setOption({
    title:{text:'Weekly ETH Volume (Mint vs Burn)',left:12,top:8,textStyle:{color:'#e6edf3',fontSize:13}},
    tooltip:{trigger:'axis',backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3'},valueFormatter:function(v){return fmt(v)+' ETH';}},
    legend:{right:12,top:8,textStyle:{color:'#8b949e',fontSize:9},data:['Minted ETH','Burned ETH']},
    grid:{left:56,right:16,top:40,bottom:28},
    xAxis:{type:'category',data:weeks,axisLabel:{color:'#6e7681',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis:{type:'value',axisLabel:{color:'#6e7681',fontSize:9,formatter:function(v){return fmt(v);}},splitLine:{lineStyle:{color:'#21262d'}}},
    series:[
      {name:'Minted ETH',type:'line',areaStyle:{opacity:0.4},data:weeks.map(function(w){return mintVol[w]||0;}),itemStyle:{color:'#3fb950'},lineStyle:{width:1.5},symbol:'none'},
      {name:'Burned ETH',type:'line',areaStyle:{opacity:0.4},data:weeks.map(function(w){return burnVol[w]||0;}),itemStyle:{color:'#f78166'},lineStyle:{width:1.5},symbol:'none'}
    ]
  });

  // Chart 4: Top stakers by event count
  var users = await query("SELECT user, count() as cnt FROM reth_flows WHERE event_type = 'mint' GROUP BY user ORDER BY cnt DESC LIMIT 8");
  echarts.init(document.getElementById('chart4')).setOption({
    title:{text:'Top Stakers (by mint count)',left:12,top:8,textStyle:{color:'#e6edf3',fontSize:13}},
    tooltip:{backgroundColor:'#161b22',borderColor:'#30363d',textStyle:{color:'#e6edf3'}},
    grid:{left:110,right:40,top:36,bottom:16},
    xAxis:{type:'value',axisLabel:{color:'#6e7681',fontSize:9},splitLine:{lineStyle:{color:'#21262d'}}},
    yAxis:{type:'category',data:users.map(function(d){return shortAddr(d.user);}).reverse(),axisLabel:{color:'#8b949e',fontSize:9},axisLine:{lineStyle:{color:'#30363d'}}},
    series:[{type:'bar',data:users.map(function(d,i){return{value:+d.cnt,itemStyle:{color:COLORS[i%COLORS.length]}};}).reverse(),
      label:{show:true,position:'right',color:'#8b949e',fontSize:9,formatter:'{c}'}}]
  });

  window.__DASHBOARD_READY__ = true;
}
init().catch(console.error);
</script>
</body>
</html>
