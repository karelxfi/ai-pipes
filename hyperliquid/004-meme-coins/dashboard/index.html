<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Hyperliquid — Meme Coins</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; width: 1200px; height: 675px; overflow: hidden; }
    .header { padding: 14px 24px 6px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 2px; }
    .stat { text-align: center; white-space: nowrap; padding: 4px 12px; background: #161b22; border-radius: 4px; }
    .stat-value { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .stat-label { font-size: 7px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat:nth-child(1) .stat-value { color: #58a6ff; }
    .stat:nth-child(2) .stat-value { color: #3fb950; }
    .stat:nth-child(3) .stat-value { color: #d2a8ff; }
    .stat:nth-child(4) .stat-value { color: #f78166; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 6px 16px; height: calc(100% - 62px - 22px); }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; position: relative; }
    .chart { width: 100%; height: 100%; }
    .footer { padding: 2px 24px 4px; text-align: right; font-size: 9px; color: #484f58; }
    .footer a { color: #484f58; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Hyperliquid — Meme Coin Frenzy</h1>
      <div class="angle">DOGE, PEPE, WIF, TRUMP &amp; more — trading volume, top pairs, degen activity</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a></div>
<script>
var CH = 'http://localhost:8123/?user=default&password=password&database=hl_memes';
var COLORS = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];

function query(sql) { return fetch(CH, { method: 'POST', body: sql + ' FORMAT JSON' }).then(function(r){return r.json()}).then(function(j){return j.data||[]}); }
function fmt(n) { if(Math.abs(n)>=1e9) return '$'+(n/1e9).toFixed(2)+'B'; if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K'; return String(n); }

function renderStats(s) {
  var el = document.getElementById('stats');
  while (el.firstChild) el.removeChild(el.firstChild);
  var items = [
    { val: fmt(+s.fills), label: 'Meme Fills' },
    { val: s.coins, label: 'Coins' },
    { val: fmt(+s.vol), label: 'Volume' },
    { val: s.t0.split('T')[0] + ' \u2192 ' + s.t1.split('T')[0], label: 'Period' }
  ];
  items.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'stat';
    var v = document.createElement('div');
    v.className = 'stat-value';
    v.textContent = item.val;
    var l = document.createElement('div');
    l.className = 'stat-label';
    l.textContent = item.label;
    div.appendChild(v);
    div.appendChild(l);
    el.appendChild(div);
  });
}

Promise.all([
  query("SELECT count() as fills, count(DISTINCT coin) as coins, sum(notional) as vol, min(timestamp) as t0, max(timestamp) as t1 FROM hl_meme_fills"),
  query("SELECT toDate(timestamp) as d, count() as cnt FROM hl_meme_fills GROUP BY d ORDER BY d"),
  query("SELECT coin, count() as fills, sum(notional) as vol FROM hl_meme_fills GROUP BY coin ORDER BY vol DESC LIMIT 15"),
  query("SELECT coin, toDate(timestamp) as d, count() as cnt FROM hl_meme_fills GROUP BY coin, d ORDER BY d"),
  query("SELECT coin, count(DISTINCT user) as traders, sum(notional) as vol FROM hl_meme_fills GROUP BY coin ORDER BY traders DESC LIMIT 15")
]).then(function(res) {
  renderStats(res[0][0]);

  // Chart 1: Daily meme fills (bar)
  var daily = res[1];
  echarts.init(document.getElementById('chart1')).setOption({
    title: { text: 'Meme Coin Fills per Day', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis' },
    grid: { left: 55, right: 16, top: 36, bottom: 28 },
    xAxis: { type: 'category', data: daily.map(function(d){return d.d}), axisLabel: { color: '#8b949e', fontSize: 9, rotate: 30 }, axisLine: { lineStyle: { color: '#30363d' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    series: [{
      type: 'bar',
      data: daily.map(function(d){return +d.cnt}),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f0883e'},{offset:1,color:'#da3633'}]) }
    }]
  });

  // Chart 2: Top meme coins by volume (horizontal bar)
  var coins = res[2];
  echarts.init(document.getElementById('chart2')).setOption({
    title: { text: 'Top Meme Coins by Volume', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name+': '+fmt(+p[0].value)+' ('+p[0].data.fills+' fills)'; } },
    grid: { left: 65, right: 16, top: 36, bottom: 12 },
    xAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9, formatter: function(v){return fmt(v)} }, splitLine: { lineStyle: { color: '#21262d' } } },
    yAxis: { type: 'category', data: coins.map(function(d){return d.coin}).reverse(), axisLabel: { color: '#e6edf3', fontSize: 10 } },
    series: [{
      type: 'bar',
      data: coins.map(function(d){return {value:+d.vol, fills:d.fills}}).reverse(),
      itemStyle: { color: function(p) { return COLORS[p.dataIndex % COLORS.length] } },
      label: { show: true, position: 'right', color: '#8b949e', fontSize: 9, formatter: function(p){return fmt(p.value)} }
    }]
  });

  // Chart 3: Stacked area — top 5 meme coins daily fills
  var topCoins = coins.slice(0, 5).map(function(c){return c.coin});
  var coinDaily = res[3];
  var dates = []; var tmp = {};
  coinDaily.forEach(function(d) {
    if (dates.indexOf(d.d) === -1) dates.push(d.d);
    if (!tmp[d.coin]) tmp[d.coin] = {};
    tmp[d.coin][d.d] = +d.cnt;
  });
  dates.sort();
  var series = topCoins.map(function(coin, i) {
    return {
      name: coin, type: 'line', stack: 'total', areaStyle: { opacity: 0.6 },
      data: dates.map(function(d){return tmp[coin] && tmp[coin][d] || 0}),
      lineStyle: { width: 1 }, itemStyle: { color: COLORS[i] }
    };
  });
  echarts.init(document.getElementById('chart3')).setOption({
    title: { text: 'Top 5 Meme Coins — Daily Trend', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis' },
    legend: { data: topCoins, right: 12, top: 8, textStyle: { color: '#8b949e', fontSize: 9 } },
    grid: { left: 50, right: 16, top: 36, bottom: 28 },
    xAxis: { type: 'category', data: dates, axisLabel: { color: '#8b949e', fontSize: 9, rotate: 30 }, axisLine: { lineStyle: { color: '#30363d' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    series: series
  });

  // Chart 4: Meme coin treemap (size = traders)
  var traders = res[4];
  echarts.init(document.getElementById('chart4')).setOption({
    title: { text: 'Meme Coins by Unique Traders', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { formatter: function(p) { return p.name+'<br>Traders: '+p.value+'<br>Volume: '+fmt(p.data.vol); } },
    series: [{
      type: 'treemap',
      top: 36, left: 8, right: 8, bottom: 8,
      data: traders.map(function(d, i) { return { name: d.coin, value: +d.traders, vol: +d.vol, itemStyle: { color: COLORS[i % COLORS.length] } } }),
      label: { show: true, color: '#e6edf3', fontSize: 12, formatter: function(p){return p.name+'\n'+p.value+' traders'} },
      breadcrumb: { show: false },
      levels: [{ itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 } }]
    }]
  });

  window.__DASHBOARD_READY__ = true;
});
</script>
</body>
</html>
