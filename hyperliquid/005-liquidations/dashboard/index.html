<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Hyperliquid — Liquidations</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; width: 1200px; height: 675px; overflow: hidden; }
    .header { padding: 14px 24px 6px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 2px; }
    .stat { text-align: center; white-space: nowrap; padding: 4px 12px; background: #161b22; border-radius: 4px; }
    .stat-value { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .stat-label { font-size: 7px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat:nth-child(1) .stat-value { color: #f78166; }
    .stat:nth-child(2) .stat-value { color: #ff7b72; }
    .stat:nth-child(3) .stat-value { color: #d29922; }
    .stat:nth-child(4) .stat-value { color: #8b949e; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 6px 16px; height: calc(100% - 62px - 22px); }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; position: relative; }
    .chart { width: 100%; height: 100%; }
    .footer { padding: 2px 24px 4px; text-align: right; font-size: 9px; color: #484f58; }
    .footer a { color: #484f58; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Hyperliquid — Liquidations</h1>
      <div class="angle">Forced closes &amp; large losses ($100+) across all coins | rekt leaderboard, cascades, long vs short</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | <a href="https://github.com/karelxfi">github.com/karelxfi</a> | <a href="https://x.com/karelxfi">x.com/karelxfi</a></div>
<script>
var CH = 'http://localhost:8123/?user=default&password=password&database=hl_liqs';
var COLORS = ['#ff7b72','#f78166','#d29922','#f0883e','#da3633','#a5d6ff','#79c0ff','#58a6ff','#3fb950','#d2a8ff'];

function query(sql) { return fetch(CH, { method: 'POST', body: sql + ' FORMAT JSON' }).then(function(r){return r.json()}).then(function(j){return j.data||[]}); }
function fmt(n) { if(Math.abs(n)>=1e9) return '$'+(n/1e9).toFixed(2)+'B'; if(Math.abs(n)>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3) return '$'+(n/1e3).toFixed(1)+'K'; return '$'+Math.abs(n).toFixed(0); }
function addr(s) { return s.slice(0,6)+'..'+s.slice(-4); }

function renderStats(s) {
  var el = document.getElementById('stats');
  while (el.firstChild) el.removeChild(el.firstChild);
  var items = [
    { val: (+(s.events)).toLocaleString(), label: 'Liquidations' },
    { val: fmt(Math.abs(+s.losses)), label: 'Total Losses' },
    { val: s.rekt, label: 'Rekt Addresses' },
    { val: s.t0.split('T')[0] + ' \u2192 ' + s.t1.split('T')[0], label: 'Period' }
  ];
  items.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'stat';
    var v = document.createElement('div');
    v.className = 'stat-value';
    v.textContent = item.val;
    var l = document.createElement('div');
    l.className = 'stat-label';
    l.textContent = item.label;
    div.appendChild(v);
    div.appendChild(l);
    el.appendChild(div);
  });
}

Promise.all([
  query("SELECT count() as events, sum(closed_pnl) as losses, count(DISTINCT user) as rekt, min(timestamp) as t0, max(timestamp) as t1 FROM hl_liquidations"),
  query("SELECT toDate(timestamp) as d, count() as cnt, sum(closed_pnl) as losses FROM hl_liquidations GROUP BY d ORDER BY d"),
  query("SELECT coin, count() as cnt, sum(closed_pnl) as losses FROM hl_liquidations GROUP BY coin ORDER BY cnt DESC LIMIT 15"),
  query("SELECT user, sum(closed_pnl) as losses, count() as events FROM hl_liquidations GROUP BY user ORDER BY losses ASC LIMIT 12"),
  query("SELECT toHour(timestamp) as h, count() as cnt FROM hl_liquidations GROUP BY h ORDER BY h")
]).then(function(res) {
  renderStats(res[0][0]);

  // Chart 1: Daily liquidation count + losses (dual axis)
  var daily = res[1];
  echarts.init(document.getElementById('chart1')).setOption({
    title: { text: 'Liquidations per Day', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue+'<br>Events: '+p[0].value+'<br>Losses: '+fmt(Math.abs(+daily[p[0].dataIndex].losses)); } },
    grid: { left: 50, right: 16, top: 36, bottom: 28 },
    xAxis: { type: 'category', data: daily.map(function(d){return d.d}), axisLabel: { color: '#8b949e', fontSize: 9, rotate: 30 }, axisLine: { lineStyle: { color: '#30363d' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    series: [{
      type: 'bar',
      data: daily.map(function(d){return +d.cnt}),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#f78166'},{offset:1,color:'#da3633'}]) }
    }]
  });

  // Chart 2: Top coins by liquidation count (horizontal bar)
  var coins = res[2];
  echarts.init(document.getElementById('chart2')).setOption({
    title: { text: 'Most Liquidated Coins', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name+': '+p[0].value+' events ('+fmt(Math.abs(+p[0].data.losses))+' lost)'; } },
    grid: { left: 75, right: 16, top: 36, bottom: 12 },
    xAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    yAxis: { type: 'category', data: coins.map(function(d){return d.coin}).reverse(), axisLabel: { color: '#e6edf3', fontSize: 10 } },
    series: [{
      type: 'bar',
      data: coins.map(function(d){return {value:+d.cnt, losses:d.losses}}).reverse(),
      itemStyle: { color: function(p) { return COLORS[p.dataIndex % COLORS.length] } },
      label: { show: true, position: 'right', color: '#8b949e', fontSize: 9 }
    }]
  });

  // Chart 3: Rekt leaderboard (most losses)
  var rekt = res[3];
  echarts.init(document.getElementById('chart3')).setOption({
    title: { text: 'Rekt Leaderboard (Most Losses)', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name+': '+fmt(Math.abs(+p[0].value))+' lost ('+p[0].data.events+' events)'; } },
    grid: { left: 80, right: 16, top: 36, bottom: 12 },
    xAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9, formatter: function(v){return fmt(Math.abs(v))} }, splitLine: { lineStyle: { color: '#21262d' } } },
    yAxis: { type: 'category', data: rekt.map(function(d){return addr(d.user)}).reverse(), axisLabel: { color: '#ff7b72', fontSize: 9, fontFamily: 'monospace' } },
    series: [{
      type: 'bar',
      data: rekt.map(function(d){return {value:+d.losses, events:d.events}}).reverse(),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#ff7b72'},{offset:1,color:'#da3633'}]) },
      label: { show: true, position: 'left', color: '#8b949e', fontSize: 9, formatter: function(p){return fmt(Math.abs(p.value))} }
    }]
  });

  // Chart 4: Liquidations by hour of day (bar)
  var hourly = res[4];
  echarts.init(document.getElementById('chart4')).setOption({
    title: { text: 'Liquidations by Hour (UTC)', left: 12, top: 8, textStyle: { color: '#e6edf3', fontSize: 13 } },
    tooltip: { trigger: 'axis' },
    grid: { left: 50, right: 16, top: 36, bottom: 28 },
    xAxis: { type: 'category', data: hourly.map(function(d){return d.h+':00'}), axisLabel: { color: '#8b949e', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } } },
    yAxis: { type: 'value', axisLabel: { color: '#8b949e', fontSize: 9 }, splitLine: { lineStyle: { color: '#21262d' } } },
    series: [{
      type: 'bar',
      data: hourly.map(function(d){return +d.cnt}),
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#d29922'},{offset:1,color:'#9e6a03'}]) }
    }]
  });

  window.__DASHBOARD_READY__ = true;
});
</script>
</body>
</html>
