<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>KAMINO CLMM ACTIVITY</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; color:#ccc;
  font-family:'Consolas','SF Mono','Source Code Pro','JetBrains Mono',monospace;
  font-size:11px; line-height:1.3;
  width:1200px; min-height:675px; overflow-x:hidden;
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto 1fr 1fr;
  gap:0; width:1200px; min-height:675px;
}
.header {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:6px 10px; border-bottom:1px solid #1a1a1a; background:#0a0a0a;
}
.header-left { display:flex; align-items:baseline; gap:16px; }
.header-title { font-size:12px; color:#4A7AB5; letter-spacing:1.2px; font-weight:normal; }
.header-subtitle { font-size:9px; color:#666; letter-spacing:0.5px; text-transform:uppercase; }
.stats { display:flex; gap:20px; }
.stat-val { font-size:16px; color:#fff; font-feature-settings:'tnum'; }
.stat-lbl { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:0.6px; }
.panel {
  border:1px solid #1a1a1a; border-top:0; border-left:0;
  padding:0; background:#0a0a0a; position:relative; overflow:hidden;
}
.panel-title {
  font-size:10px; color:#666; text-transform:uppercase; letter-spacing:0.8px;
  padding:6px 8px 0 8px;
}
.chart { width:100%; height:calc(100% - 22px); }
.wide { grid-column: span 2; }
.footer {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:3px 10px; border-top:1px solid #1a1a1a; background:#0a0a0a;
  font-size:9px; color:#444;
}
</style>
</head>
<body>
<div class="grid">
  <div class="header">
    <div class="header-left">
      <div class="header-title">KAMINO CLMM ACTIVITY</div>
      <div class="header-subtitle" id="hdr-period">loading...</div>
    </div>
    <div class="stats">
      <div><div class="stat-val" id="st-total">&#8212;</div><div class="stat-lbl">TOTAL ACTIONS</div></div>
      <div><div class="stat-val" id="st-invests">&#8212;</div><div class="stat-lbl">INVESTS</div></div>
      <div><div class="stat-val" id="st-deposits">&#8212;</div><div class="stat-lbl">DEPOSITS</div></div>
      <div><div class="stat-val" id="st-err">&#8212;</div><div class="stat-lbl">ERROR RATE</div></div>
    </div>
  </div>

  <div class="panel wide">
    <div class="panel-title">DAILY ACTION VOLUME (STACKED)</div>
    <div class="chart" id="c-daily"></div>
  </div>
  <div class="panel">
    <div class="panel-title">ACTION TYPE BREAKDOWN</div>
    <div class="chart" id="c-treemap"></div>
  </div>

  <div class="panel">
    <div class="panel-title">HOURLY ACTIVITY HEATMAP</div>
    <div class="chart" id="c-hourly"></div>
  </div>
  <div class="panel">
    <div class="panel-title">TOP STRATEGIES (ACTIONS)</div>
    <div class="chart" id="c-top-strategies"></div>
  </div>
  <div class="panel">
    <div class="panel-title">INVEST VS WITHDRAW RATIO</div>
    <div class="chart" id="c-ratio"></div>
  </div>

  <div class="footer">
    <span>Built with ai-pipes + SQD Pipes SDK | github.com/karelxfi | x.com/karelxfi</span>
    <span id="ft-update"></span>
  </div>
</div>

<script>
var CH = 'http://localhost:8123';
var DB = 'kamino_liquidity';
var ACTION_COLORS = {
  'Invest':'#2B4F7E','Deposit':'#3D7A6B','Withdraw':'#8B3A3A','Rebalance':'#4A7AB5',
  'CollectFees':'#1E3A5F','CollectRewards':'#3D6494','Swap':'#5A8ABF',
  'SingleTokenDeposit':'#2E5480','SingleTokenDepositAndInvest':'#1A3050',
  'WithdrawAndCollect':'#6B2A2A','OpenPosition':'#274D73','ClosePosition':'#1F4470',
  'OpenLiquidityPosition':'#3B6A9E','CloseLiquidityPosition':'#4A3050',
  'ExecutiveWithdraw':'#703030','FlashSwapUnevenness':'#405060',
  'PermissionlessRebalance':'#506070','CheckRebalanceNeeded':'#354555',
  'EmergencySwap':'#604040','DepositAndInvest':'#305040',
  'CollectPendingFees':'#204060','CollectAllRewards':'#304050',
  'SwapRewards':'#405050'
};

function q(sql) {
  return fetch(CH+'/?database='+DB+'&default_format=JSONEachRow&user=default&password=password', {method:'POST',body:sql})
    .then(function(r){return r.text()})
    .then(function(t){
      if(!t.trim()) return [];
      return t.trim().split('\n').map(function(l){return JSON.parse(l)});
    });
}
function fmt(n) {
  if(Math.abs(n)>=1e9) return (n/1e9).toFixed(1)+'B';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}
function termOpts() {
  return {
    backgroundColor:'transparent',
    textStyle:{color:'#666',fontFamily:'Consolas,SF Mono,monospace'},
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8]},
    grid:{left:48,right:8,top:8,bottom:24},
    animation:false
  };
}

async function init() {
  var stats = await q("SELECT count() as total, countIf(action = 'Invest') as invests, countIf(action IN ('Deposit','SingleTokenDeposit','SingleTokenDepositAndInvest','DepositAndInvest')) as deposits, countIf(is_error = 1) as errs, min(timestamp) as t0, max(timestamp) as t1 FROM kamino_actions FINAL");
  if(!stats.length || +stats[0].total === 0) { document.getElementById('hdr-period').textContent='NO DATA YET'; return; }
  var s = stats[0];
  document.getElementById('st-total').textContent = fmt(+s.total);
  document.getElementById('st-invests').textContent = fmt(+s.invests);
  document.getElementById('st-deposits').textContent = fmt(+s.deposits);
  document.getElementById('st-err').textContent = ((+s.errs/+s.total)*100).toFixed(1)+'%';
  document.getElementById('hdr-period').textContent = s.t0.slice(0,10)+' \u2192 '+s.t1.slice(0,10);
  document.getElementById('ft-update').textContent = 'Last: '+s.t1.slice(0,19)+' UTC';

  // 1. Daily stacked bar by action type
  var daily = await q("SELECT toDate(timestamp) as d, action, count() as cnt FROM kamino_actions FINAL GROUP BY d, action ORDER BY d");
  var dates = []; var seen = {};
  daily.forEach(function(r){ if(!seen[r.d]){seen[r.d]=1;dates.push(r.d)} });
  var actionTypes = []; var seenA = {};
  daily.forEach(function(r){ if(!seenA[r.action]){seenA[r.action]=1;actionTypes.push(r.action)} });
  var seriesMap = {};
  actionTypes.forEach(function(a){ seriesMap[a] = {}; });
  daily.forEach(function(r){ seriesMap[r.action][r.d] = +r.cnt; });
  var dailySeries = actionTypes.map(function(a){
    return {name:a,type:'bar',stack:'vol',barMaxWidth:8,itemStyle:{color:ACTION_COLORS[a]||'#333'},
      data:dates.map(function(d){return seriesMap[a][d]||0;})};
  });
  echarts.init(document.getElementById('c-daily')).setOption(Object.assign(termOpts(), {
    legend:{show:true,top:0,right:8,textStyle:{color:'#666',fontSize:8,fontFamily:'Consolas,monospace'},itemWidth:8,itemHeight:6},
    grid:{left:48,right:8,top:20,bottom:24},
    xAxis:{type:'category',data:dates,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    tooltip:{trigger:'axis'},
    series:dailySeries
  }));

  // 2. Treemap breakdown
  var breakdown = await q("SELECT action, count() as cnt FROM kamino_actions FINAL GROUP BY action ORDER BY cnt DESC");
  var treeData = breakdown.map(function(r){
    return {name:r.action, value:+r.cnt, itemStyle:{color:ACTION_COLORS[r.action]||'#333'}};
  });
  echarts.init(document.getElementById('c-treemap')).setOption({
    backgroundColor:'transparent', animation:false,
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8]},
    series:[{type:'treemap',data:treeData,roam:false,nodeClick:false,breadcrumb:{show:false},
      label:{color:'#ccc',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(p){return p.name+'\n'+fmt(p.value);}},
      itemStyle:{borderColor:'#000',borderWidth:1,gapWidth:1}}]
  });

  // 3. Hourly activity
  var hourly = await q("SELECT toHour(timestamp) as h, count() as cnt FROM kamino_actions FINAL GROUP BY h ORDER BY h");
  echarts.init(document.getElementById('c-hourly')).setOption(Object.assign(termOpts(), {
    grid:{left:40,right:8,top:8,bottom:24},
    xAxis:{type:'category',data:hourly.map(function(r){return r.h+'h'}),axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    series:[{type:'bar',data:hourly.map(function(r){return +r.cnt}),barMaxWidth:10,itemStyle:{color:'#2B4F7E'}}]
  }));

  // 4. Top strategies
  var top = await q("SELECT strategy, count() as cnt FROM kamino_actions FINAL GROUP BY strategy ORDER BY cnt DESC LIMIT 10");
  var names = top.map(function(r){return r.strategy.slice(0,4)+'..'+r.strategy.slice(-4)}).reverse();
  var vals = top.map(function(r){return +r.cnt}).reverse();
  echarts.init(document.getElementById('c-top-strategies')).setOption(Object.assign(termOpts(), {
    grid:{left:64,right:48,top:4,bottom:16},
    xAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    yAxis:{type:'category',data:names,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#ccc',fontSize:9,fontFamily:'Consolas,monospace'}},
    series:[{type:'bar',data:vals,barMaxWidth:10,itemStyle:{color:'#3D7A6B'},
      label:{show:true,position:'right',color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(p){return fmt(p.value)}}}]
  }));

  // 5. Invest vs withdraw ratio over time
  var ratio = await q("SELECT toDate(timestamp) as d, countIf(action IN ('Invest','Deposit','SingleTokenDeposit','SingleTokenDepositAndInvest','DepositAndInvest')) as inflows, countIf(action IN ('Withdraw','WithdrawAndCollect','ExecutiveWithdraw')) as outflows FROM kamino_actions FINAL GROUP BY d HAVING inflows + outflows > 5 ORDER BY d");
  var rDates = ratio.map(function(r){return r.d});
  var rPcts = ratio.map(function(r){var t=+r.inflows + +r.outflows; return t>0 ? (+r.inflows/t)*100 : 0;});
  echarts.init(document.getElementById('c-ratio')).setOption(Object.assign(termOpts(), {
    grid:{left:40,right:8,top:8,bottom:24},
    xAxis:{type:'category',data:rDates,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v+'%'}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}},min:0,max:100},
    tooltip:{trigger:'axis',formatter:function(ps){return ps[0].name+'<br>Inflow rate: '+ps[0].value.toFixed(1)+'%';}},
    series:[{type:'line',data:rPcts,lineStyle:{width:1.5,color:'#3D7A6B'},showSymbol:false,areaStyle:{opacity:0.08,color:'#3D7A6B'},itemStyle:{color:'#3D7A6B'}}]
  }));

  window.__DASHBOARD_READY__ = true;
}

init().catch(function(e){console.error(e);});
</script>
</body>
</html>
