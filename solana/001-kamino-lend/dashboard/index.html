<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Kamino Lend — Lending Activity Pulse</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header {
      padding: 14px 24px 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #e6edf3; }
    .header .angle { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: #58a6ff; line-height: 1.2; }
    .stat-label { font-size: 8px; color: #6e7681; text-transform: uppercase; letter-spacing: 1px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 6px 16px;
      height: calc(100% - 62px - 22px);
    }
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      position: relative;
    }
    .chart { width: 100%; height: 100%; }
    .footer {
      padding: 2px 24px 4px;
      text-align: right;
      font-size: 9px;
      color: #484f58;
    }
    .footer a { color: #58a6ff; text-decoration: none; opacity: 0.5; }
    .footer a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Kamino Lend — Lending Activity Pulse</h1>
      <div class="angle">Deposits, borrows, liquidations on Solana's largest lending protocol | Solana Mainnet</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="grid">
    <div class="panel"><div class="chart" id="chart1"></div></div>
    <div class="panel"><div class="chart" id="chart2"></div></div>
    <div class="panel"><div class="chart" id="chart3"></div></div>
    <div class="panel"><div class="chart" id="chart4"></div></div>
  </div>
  <div class="footer">
    Built with ai-pipes + SQD Pipes SDK |
    <a href="https://github.com/karelxfi">github.com/karelxfi</a> |
    <a href="https://x.com/karelxfi">x.com/karelxfi</a>
  </div>

  <script>
    var CH = 'http://localhost:8123';
    var DB = 'kamino_lend';
    var T = 'kamino_actions';

    function q(sql) {
      return fetch(CH + '/?database=' + DB + '&user=default&password=password&query=' + encodeURIComponent(sql + ' FORMAT JSON'))
        .then(function(r) { return r.json(); })
        .then(function(j) { return j.data; });
    }

    var PALETTE = ['#58a6ff','#f78166','#3fb950','#d2a8ff','#f0883e','#79c0ff','#7ee787','#d29922','#ff7b72','#a5d6ff'];
    var ACTION_COLORS = {
      deposit: '#3fb950',
      borrow: '#58a6ff',
      repay: '#d2a8ff',
      liquidate: '#ff7b72',
      withdraw: '#f0883e'
    };

    function darkOpts(title) {
      return {
        backgroundColor: 'transparent',
        title: { text: title, textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        textStyle: { color: '#8b949e', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial' },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 } },
        grid: { left: 50, right: 16, top: 36, bottom: 28 },
      };
    }

    function fmt(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(n);
    }

    async function init() {
      // Stats
      var totals = await q("SELECT count() as total, uniq(fee_payer) as users, countIf(action = 'liquidate') as liquidations, min(timestamp) as min_ts, max(timestamp) as max_ts FROM " + T);
      var st = totals[0];
      var statsEl = document.getElementById('stats');
      var period = (st.min_ts || '').slice(0, 10) + ' -> ' + (st.max_ts || '').slice(0, 10);
      [
        {v: fmt(parseInt(st.total)), l: 'Total Actions'},
        {v: fmt(parseInt(st.users)), l: 'Unique Users'},
        {v: fmt(parseInt(st.liquidations)), l: 'Liquidations'},
        {v: period, l: 'Period', small: true}
      ].forEach(function(s) {
        var d = document.createElement('div'); d.className = 'stat';
        var vl = document.createElement('div'); vl.className = 'stat-value';
        if (s.small) vl.style.fontSize = '11px';
        vl.textContent = s.v;
        var lb = document.createElement('div'); lb.className = 'stat-label'; lb.textContent = s.l;
        d.appendChild(vl); d.appendChild(lb); statsEl.appendChild(d);
      });

      // Chart 1: Daily Activity Breakdown — stacked area chart
      var daily = await q("SELECT toDate(timestamp) as day, action, count() as n FROM " + T + " GROUP BY day, action ORDER BY day");
      var days = [];
      var daySet = {};
      var seriesData = {};
      var actions = ['deposit', 'borrow', 'repay', 'withdraw', 'liquidate'];
      actions.forEach(function(a) { seriesData[a] = {}; });
      daily.forEach(function(r) {
        if (!daySet[r.day]) { daySet[r.day] = true; days.push(r.day); }
        seriesData[r.action][r.day] = parseInt(r.n);
      });
      var ch1 = echarts.init(document.getElementById('chart1'));
      ch1.setOption(Object.assign(darkOpts('Daily Activity Breakdown'), {
        legend: { data: actions, textStyle: { color: '#8b949e', fontSize: 9 }, top: 6, right: 16, itemWidth: 10, itemHeight: 10 },
        grid: { left: 50, right: 16, top: 32, bottom: 28 },
        xAxis: { type: 'category', data: days, axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        tooltip: { trigger: 'axis' },
        series: actions.map(function(a) {
          return {
            name: a, type: 'line', stack: 'total', areaStyle: { opacity: 0.6 }, symbol: 'none', lineStyle: { width: 1 },
            itemStyle: { color: ACTION_COLORS[a] },
            data: days.map(function(d) { return seriesData[a][d] || 0; })
          };
        }),
      }));

      // Chart 2: Action Distribution — treemap
      var dist = await q("SELECT action, count() as n FROM " + T + " GROUP BY action ORDER BY n DESC");
      var ch2 = echarts.init(document.getElementById('chart2'));
      ch2.setOption({
        backgroundColor: 'transparent',
        title: { text: 'Action Distribution', textStyle: { color: '#8b949e', fontSize: 11, fontWeight: 'normal' }, left: 10, top: 8 },
        tooltip: { backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 11 }, formatter: function(p) { return p.name + ': <b>' + fmt(p.value) + '</b> actions'; } },
        series: [{
          type: 'treemap',
          top: 32, left: 8, right: 8, bottom: 8,
          roam: false,
          nodeClick: false,
          breadcrumb: { show: false },
          label: { show: true, color: '#e6edf3', fontSize: 13, fontWeight: 'bold', formatter: function(p) { return p.name + '\n' + fmt(p.value); } },
          itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 },
          levels: [{ itemStyle: { borderColor: '#0d1117', borderWidth: 2, gapWidth: 2 } }],
          data: dist.map(function(d) {
            return { value: parseInt(d.n), name: d.action, itemStyle: { color: ACTION_COLORS[d.action] || PALETTE[0] } };
          }),
        }],
      });

      // Chart 3: Unique Users Per Day — area chart
      var users = await q("SELECT toDate(timestamp) as day, uniq(fee_payer) as n FROM " + T + " GROUP BY day ORDER BY day");
      var ch3 = echarts.init(document.getElementById('chart3'));
      ch3.setOption(Object.assign(darkOpts('Unique Users Per Day'), {
        xAxis: { type: 'category', data: users.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
        yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
        series: [{
          type: 'line', symbol: 'none', lineStyle: { width: 1.5, color: '#58a6ff' },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(88,166,255,0.4)'}, {offset: 1, color: 'rgba(88,166,255,0.02)'}]) },
          data: users.map(function(d){return parseInt(d.n);})
        }],
        tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Unique Users: <b>' + p[0].value + '</b>'; } },
      }));

      // Chart 4: Liquidation Events — bar chart (red)
      var liqs = await q("SELECT toDate(timestamp) as day, count() as n FROM " + T + " WHERE action = 'liquidate' GROUP BY day ORDER BY day");
      var ch4 = echarts.init(document.getElementById('chart4'));
      if (liqs.length === 0) {
        // No liquidations yet — show empty state
        ch4.setOption(Object.assign(darkOpts('Liquidation Events'), {
          graphic: { type: 'text', left: 'center', top: 'middle', style: { text: 'No liquidations in period', fill: '#484f58', fontSize: 14 } }
        }));
      } else {
        ch4.setOption(Object.assign(darkOpts('Liquidation Events'), {
          xAxis: { type: 'category', data: liqs.map(function(d){return d.day;}), axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { lineStyle: { color: '#30363d' } }, splitLine: { show: false } },
          yAxis: { type: 'value', axisLabel: { color: '#6e7681', fontSize: 9 }, axisLine: { show: false }, splitLine: { lineStyle: { color: '#21262d' } } },
          series: [{
            type: 'bar', data: liqs.map(function(d){return parseInt(d.n);}),
            itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#ff7b72'},{offset:1,color:'#da3633'}]), borderRadius: [2,2,0,0] },
            barMaxWidth: 12
          }],
          tooltip: { trigger: 'axis', formatter: function(p) { return p[0].axisValue + '<br/>Liquidations: <b>' + p[0].value + '</b>'; } },
        }));
      }

      window.__DASHBOARD_READY__ = true;
    }

    init().catch(function(err) {
      console.error('Dashboard error:', err);
      var e = document.createElement('div');
      e.style.cssText = 'color:#f78166;padding:24px;font-size:14px';
      e.textContent = 'Error: ' + err.message;
      document.body.appendChild(e);
    });
  </script>
</body>
</html>
