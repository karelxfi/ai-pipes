<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>JUPSOL STAKING FLOW</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; color:#ccc;
  font-family:'Consolas','SF Mono','Source Code Pro','JetBrains Mono',monospace;
  font-size:11px; line-height:1.3;
  width:1200px; min-height:675px; overflow-x:hidden;
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto 1fr 1fr;
  gap:0; width:1200px; min-height:675px;
}
.header {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:6px 10px; border-bottom:1px solid #1a1a1a; background:#0a0a0a;
}
.header-left { display:flex; align-items:baseline; gap:16px; }
.header-title { font-size:12px; color:#4A7AB5; letter-spacing:1.2px; font-weight:normal; }
.header-subtitle { font-size:9px; color:#666; letter-spacing:0.5px; text-transform:uppercase; }
.stats { display:flex; gap:20px; }
.stat-val { font-size:16px; color:#fff; font-feature-settings:'tnum'; }
.stat-lbl { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:0.6px; }
.panel {
  border:1px solid #1a1a1a; border-top:0; border-left:0;
  padding:0; background:#0a0a0a; position:relative; overflow:hidden;
}
.panel:nth-child(2) { border-left:0; }
.panel-title {
  font-size:10px; color:#666; text-transform:uppercase; letter-spacing:0.8px;
  padding:6px 8px 0 8px;
}
.chart { width:100%; height:calc(100% - 22px); }
.wide { grid-column: span 2; }
.footer {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:3px 10px; border-top:1px solid #1a1a1a; background:#0a0a0a;
  font-size:9px; color:#444;
}
</style>
</head>
<body>
<div class="grid">
  <div class="header">
    <div class="header-left">
      <div class="header-title">JUPSOL STAKING FLOW</div>
      <div class="header-subtitle" id="hdr-period">loading...</div>
    </div>
    <div class="stats">
      <div><div class="stat-val" id="st-total">—</div><div class="stat-lbl">TOTAL OPS</div></div>
      <div><div class="stat-val" id="st-deposits">—</div><div class="stat-lbl">DEPOSITS</div></div>
      <div><div class="stat-val" id="st-withdrawals">—</div><div class="stat-lbl">WITHDRAWALS</div></div>
      <div><div class="stat-val" id="st-net">—</div><div class="stat-lbl">NET FLOW (SOL)</div></div>
    </div>
  </div>

  <!-- Row 1 -->
  <div class="panel wide">
    <div class="panel-title">DAILY STAKING FLOW (SOL)</div>
    <div class="chart" id="c-flow"></div>
  </div>
  <div class="panel">
    <div class="panel-title">OPERATION BREAKDOWN</div>
    <div class="chart" id="c-treemap"></div>
  </div>

  <!-- Row 2 -->
  <div class="panel">
    <div class="panel-title">DAILY OPERATIONS COUNT</div>
    <div class="chart" id="c-daily-ops"></div>
  </div>
  <div class="panel">
    <div class="panel-title">TOP STAKERS (SOL DEPOSITED)</div>
    <div class="chart" id="c-top-stakers"></div>
  </div>
  <div class="panel">
    <div class="panel-title">CUMULATIVE NET FLOW (SOL)</div>
    <div class="chart" id="c-cumulative"></div>
  </div>

  <div class="footer">
    <span>Built with ai-pipes + SQD Pipes SDK | github.com/karelxfi | x.com/karelxfi</span>
    <span id="ft-update"></span>
  </div>
</div>

<script>
var CH = 'http://localhost:8123';
var DB = 'jupsol_staking';

function q(sql) {
  return fetch(CH+'/?database='+DB+'&default_format=JSONEachRow&user=default&password=password', {method:'POST',body:sql})
    .then(function(r){return r.text()})
    .then(function(t){
      if(!t.trim()) return [];
      return t.trim().split('\n').map(function(l){return JSON.parse(l)});
    });
}
function fmt(n) {
  if(Math.abs(n)>=1e9) return (n/1e9).toFixed(1)+'B';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}
function termOpts() {
  return {
    backgroundColor:'transparent',
    textStyle:{color:'#666',fontFamily:'Consolas,SF Mono,monospace'},
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8]},
    grid:{left:56,right:8,top:8,bottom:24},
    animation:false
  };
}

async function init() {
  // Header stats
  var stats = await q("SELECT count() as total, countIf(action = 'Deposit') as deps, countIf(action = 'Withdraw') as wds, sum(CASE WHEN action = 'Deposit' THEN amount_sol ELSE -amount_sol END) as net, min(timestamp) as t0, max(timestamp) as t1 FROM jupsol_ops FINAL");
  if(!stats.length || +stats[0].total === 0) { document.getElementById('hdr-period').textContent='NO DATA YET'; return; }
  var s = stats[0];
  document.getElementById('st-total').textContent = fmt(+s.total);
  document.getElementById('st-deposits').textContent = fmt(+s.deps);
  document.getElementById('st-withdrawals').textContent = fmt(+s.wds);
  var net = +s.net;
  document.getElementById('st-net').textContent = (net>=0?'+':'')+fmt(net);
  document.getElementById('st-net').style.color = net>=0?'#4AF6C3':'#FF433D';
  document.getElementById('hdr-period').textContent = s.t0.slice(0,10)+' \u2192 '+s.t1.slice(0,10);
  document.getElementById('ft-update').textContent = 'Last: '+s.t1.slice(0,19)+' UTC';

  // 1. Daily staking flow (stacked bar: deposits positive, withdrawals negative)
  var flow = await q("SELECT toDate(timestamp) as d, sum(CASE WHEN action = 'Deposit' THEN amount_sol ELSE 0 END) as dep, sum(CASE WHEN action = 'Withdraw' THEN amount_sol ELSE 0 END) as wd FROM jupsol_ops FINAL GROUP BY d ORDER BY d");
  var dates = flow.map(function(r){return r.d});
  echarts.init(document.getElementById('c-flow')).setOption(Object.assign(termOpts(), {
    legend:{show:true,top:0,right:8,textStyle:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'},itemWidth:10,itemHeight:8},
    grid:{left:60,right:8,top:20,bottom:24},
    xAxis:{type:'category',data:dates,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)+' SOL'}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    tooltip:{trigger:'axis',formatter:function(ps){var h=ps[0].name+'<br>';ps.forEach(function(p){h+=p.marker+' '+p.seriesName+': '+fmt(Math.abs(p.value))+' SOL<br>';});return h;}},
    series:[
      {name:'Deposits',type:'bar',stack:'flow',data:flow.map(function(r){return +r.dep}),barMaxWidth:8,itemStyle:{color:'#3D7A6B'}},
      {name:'Withdrawals',type:'bar',stack:'flow',data:flow.map(function(r){return -(+r.wd)}),barMaxWidth:8,itemStyle:{color:'#8B3A3A'}}
    ]
  }));

  // 2. Operation breakdown treemap
  var breakdown = await q("SELECT action as i, count() as cnt FROM jupsol_ops FINAL GROUP BY i ORDER BY cnt DESC");
  var colors = {'Deposit':'#3D7A6B','Withdraw':'#8B3A3A'};
  var treeData = breakdown.map(function(r){
    return {name:r.i, value:+r.cnt, itemStyle:{color:colors[r.i]||'#333'}};
  });
  echarts.init(document.getElementById('c-treemap')).setOption({
    backgroundColor:'transparent', animation:false,
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8],formatter:function(p){return p.name+': '+fmt(p.value)+' ops';}},
    series:[{type:'treemap',data:treeData,roam:false,nodeClick:false,breadcrumb:{show:false},
      label:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace',formatter:function(p){return p.name+'\n'+fmt(p.value);}},
      itemStyle:{borderColor:'#000',borderWidth:1,gapWidth:1}}]
  });

  // 3. Daily operations count
  var dailyOps = await q("SELECT toDate(timestamp) as d, count() as cnt FROM jupsol_ops FINAL GROUP BY d ORDER BY d");
  echarts.init(document.getElementById('c-daily-ops')).setOption(Object.assign(termOpts(), {
    grid:{left:48,right:8,top:8,bottom:24},
    xAxis:{type:'category',data:dailyOps.map(function(r){return r.d}),axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    series:[{type:'bar',data:dailyOps.map(function(r){return +r.cnt}),barMaxWidth:8,itemStyle:{color:'#2B4F7E'}}]
  }));

  // 4. Top stakers by SOL deposited
  var topStakers = await q("SELECT authority, sum(amount_sol) as total FROM jupsol_ops FINAL WHERE action = 'Deposit' GROUP BY authority ORDER BY total DESC LIMIT 10");
  var names = topStakers.map(function(r){return r.authority.slice(0,4)+'..'+r.authority.slice(-4)}).reverse();
  var vals = topStakers.map(function(r){return +r.total}).reverse();
  echarts.init(document.getElementById('c-top-stakers')).setOption(Object.assign(termOpts(), {
    grid:{left:64,right:56,top:4,bottom:16},
    xAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    yAxis:{type:'category',data:names,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#ccc',fontSize:9,fontFamily:'Consolas,monospace'}},
    series:[{type:'bar',data:vals,barMaxWidth:10,itemStyle:{color:'#3D7A6B'},
      label:{show:true,position:'right',color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(p){return fmt(p.value)+' SOL'}}}]
  }));

  // 5. Cumulative net flow
  var cumul = await q("SELECT d, sum(net) OVER (ORDER BY d) as cumul FROM (SELECT toDate(timestamp) as d, sum(CASE WHEN action = 'Deposit' THEN amount_sol ELSE -amount_sol END) as net FROM jupsol_ops FINAL GROUP BY d) ORDER BY d");
  echarts.init(document.getElementById('c-cumulative')).setOption(Object.assign(termOpts(), {
    grid:{left:60,right:8,top:8,bottom:24},
    xAxis:{type:'category',data:cumul.map(function(r){return r.d}),axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    series:[{type:'line',data:cumul.map(function(r){return +r.cumul}),lineStyle:{width:1.5,color:'#4A7AB5'},showSymbol:false,areaStyle:{opacity:0.08,color:'#4A7AB5'},itemStyle:{color:'#4A7AB5'}}]
  }));

  window.__DASHBOARD_READY__ = true;
}

init().catch(function(e){console.error(e);});
</script>
</body>
</html>
