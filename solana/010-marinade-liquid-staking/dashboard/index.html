<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>MARINADE STAKING FLOW</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; color:#ccc;
  font-family:'Consolas','SF Mono','Source Code Pro','JetBrains Mono',monospace;
  font-size:11px; line-height:1.3;
  width:1200px; min-height:675px; overflow-x:hidden;
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto 1fr 1fr;
  gap:0; width:1200px; min-height:675px;
}
.header {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:6px 10px; border-bottom:1px solid #1a1a1a; background:#0a0a0a;
}
.header-left { display:flex; align-items:baseline; gap:16px; }
.header-title { font-size:12px; color:#4A7AB5; letter-spacing:1.2px; font-weight:normal; }
.header-subtitle { font-size:9px; color:#666; letter-spacing:0.5px; text-transform:uppercase; }
.stats { display:flex; gap:20px; }
.stat-val { font-size:16px; color:#fff; font-feature-settings:'tnum'; }
.stat-lbl { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:0.6px; }
.panel {
  border:1px solid #1a1a1a; border-top:0; border-left:0;
  padding:0; background:#0a0a0a; position:relative; overflow:hidden;
}
.panel-title {
  font-size:10px; color:#666; text-transform:uppercase; letter-spacing:0.8px;
  padding:6px 8px 0 8px;
}
.chart { width:100%; height:calc(100% - 22px); }
.wide { grid-column: span 2; }
.footer {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:3px 10px; border-top:1px solid #1a1a1a; background:#0a0a0a;
  font-size:9px; color:#444;
}
</style>
</head>
<body>
<div class="grid">
  <div class="header">
    <div class="header-left">
      <div class="header-title">MARINADE STAKING FLOW</div>
      <div class="header-subtitle" id="hdr-period">loading...</div>
    </div>
    <div class="stats">
      <div><div class="stat-val" id="st-total">--</div><div class="stat-lbl">TOTAL OPS</div></div>
      <div><div class="stat-val" id="st-deposits">--</div><div class="stat-lbl">DEPOSITS</div></div>
      <div><div class="stat-val" id="st-unstakes">--</div><div class="stat-lbl">UNSTAKES</div></div>
      <div><div class="stat-val" id="st-vol">--</div><div class="stat-lbl">SOL VOLUME</div></div>
    </div>
  </div>

  <div class="panel wide">
    <div class="panel-title">DAILY DEPOSIT / UNSTAKE VOLUME (SOL)</div>
    <div class="chart" id="c-daily"></div>
  </div>
  <div class="panel">
    <div class="panel-title">ACTION TYPE BREAKDOWN</div>
    <div class="chart" id="c-treemap"></div>
  </div>

  <div class="panel">
    <div class="panel-title">CUMULATIVE NET FLOW (SOL)</div>
    <div class="chart" id="c-cumflow"></div>
  </div>
  <div class="panel">
    <div class="panel-title">TOP STAKERS (BY SOL)</div>
    <div class="chart" id="c-top"></div>
  </div>
  <div class="panel">
    <div class="panel-title">HOURLY ACTIVITY</div>
    <div class="chart" id="c-hourly"></div>
  </div>

  <div class="footer">
    <span>Built with ai-pipes + SQD Pipes SDK | github.com/karelxfi | x.com/karelxfi</span>
    <span id="ft-update"></span>
  </div>
</div>

<script>
var CH = 'http://localhost:8123';
var DB = 'marinade_staking';
var ACTION_COLORS = {
  'deposit':'#3D7A6B','liquid_unstake':'#8B3A3A','order_unstake':'#6B2A2A',
  'claim':'#4A7AB5','deposit_stake_account':'#2B4F7E','withdraw_stake_account':'#1E3A5F'
};

function q(sql) {
  return fetch(CH+'/?database='+DB+'&default_format=JSONEachRow&user=default&password=password', {method:'POST',body:sql})
    .then(function(r){return r.text()})
    .then(function(t){
      if(!t.trim()) return [];
      return t.trim().split('\n').map(function(l){return JSON.parse(l)});
    });
}
function fmt(n) {
  if(Math.abs(n)>=1e9) return (n/1e9).toFixed(1)+'B';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(0);
}
function fmtSol(n) {
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(1);
}
function termOpts() {
  return {
    backgroundColor:'transparent',
    textStyle:{color:'#666',fontFamily:'Consolas,SF Mono,monospace'},
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8]},
    grid:{left:48,right:8,top:8,bottom:24},
    animation:false
  };
}

async function init() {
  var stats = await q("SELECT count() as total, countIf(action = 'deposit' OR action = 'deposit_stake_account') as deposits, countIf(action IN ('liquid_unstake','order_unstake','withdraw_stake_account')) as unstakes, round(sum(amount_sol), 0) as vol, min(timestamp) as t0, max(timestamp) as t1 FROM marinade_ops FINAL");
  if(!stats.length || +stats[0].total === 0) { document.getElementById('hdr-period').textContent='NO DATA YET'; return; }
  var s = stats[0];
  document.getElementById('st-total').textContent = fmt(+s.total);
  document.getElementById('st-deposits').textContent = fmt(+s.deposits);
  document.getElementById('st-unstakes').textContent = fmt(+s.unstakes);
  document.getElementById('st-vol').textContent = fmtSol(+s.vol);
  document.getElementById('hdr-period').textContent = s.t0.slice(0,10)+' \u2192 '+s.t1.slice(0,10);
  document.getElementById('ft-update').textContent = 'Last: '+s.t1.slice(0,19)+' UTC';

  // 1. Daily deposit/unstake volume
  var daily = await q("SELECT toDate(timestamp) as d, round(sumIf(amount_sol, action IN ('deposit','deposit_stake_account')), 1) as dep, round(sumIf(amount_sol, action IN ('liquid_unstake','order_unstake','withdraw_stake_account')), 1) as uns FROM marinade_ops FINAL GROUP BY d ORDER BY d");
  var dates = daily.map(function(r){return r.d});
  echarts.init(document.getElementById('c-daily')).setOption(Object.assign(termOpts(), {
    legend:{show:true,top:0,right:8,textStyle:{color:'#666',fontSize:8,fontFamily:'Consolas,monospace'},itemWidth:8,itemHeight:6},
    grid:{left:56,right:8,top:20,bottom:24},
    xAxis:{type:'category',data:dates,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmtSol(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    tooltip:{trigger:'axis',formatter:function(ps){var out=ps[0].name;ps.forEach(function(p){out+='<br>'+p.marker+' '+p.seriesName+': '+fmtSol(+p.value)+' SOL'});return out}},
    series:[
      {name:'Deposits',type:'bar',stack:'vol',barMaxWidth:8,itemStyle:{color:'#3D7A6B'},data:daily.map(function(r){return +r.dep})},
      {name:'Unstakes',type:'bar',stack:'vol',barMaxWidth:8,itemStyle:{color:'#8B3A3A'},data:daily.map(function(r){return +r.uns})}
    ]
  }));

  // 2. Treemap breakdown
  var breakdown = await q("SELECT action, count() as cnt FROM marinade_ops FINAL GROUP BY action ORDER BY cnt DESC");
  var treeData = breakdown.map(function(r){
    return {name:r.action, value:+r.cnt, itemStyle:{color:ACTION_COLORS[r.action]||'#333'}};
  });
  echarts.init(document.getElementById('c-treemap')).setOption({
    backgroundColor:'transparent', animation:false,
    tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',textStyle:{color:'#ccc',fontSize:10,fontFamily:'Consolas,monospace'},padding:[4,8]},
    series:[{type:'treemap',data:treeData,roam:false,nodeClick:false,breadcrumb:{show:false},
      label:{color:'#ccc',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(p){return p.name+'\n'+fmt(p.value);}},
      itemStyle:{borderColor:'#000',borderWidth:1,gapWidth:1}}]
  });

  // 3. Cumulative net flow
  var flow = await q("SELECT toDate(timestamp) as d, round(sumIf(amount_sol, action IN ('deposit','deposit_stake_account')) - sumIf(amount_sol, action IN ('liquid_unstake','order_unstake','withdraw_stake_account')), 1) as net FROM marinade_ops FINAL GROUP BY d ORDER BY d");
  var cumDates = flow.map(function(r){return r.d});
  var cumVals = []; var running = 0;
  flow.forEach(function(r){ running += +r.net; cumVals.push(Math.round(running)); });
  echarts.init(document.getElementById('c-cumflow')).setOption(Object.assign(termOpts(), {
    grid:{left:56,right:8,top:8,bottom:24},
    xAxis:{type:'category',data:cumDates,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return v.slice(5)}}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmtSol(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    tooltip:{trigger:'axis',formatter:function(ps){return ps[0].name+'<br>Net flow: '+fmtSol(ps[0].value)+' SOL'}},
    series:[{type:'line',data:cumVals,lineStyle:{width:1.5,color:'#4A7AB5'},showSymbol:false,areaStyle:{opacity:0.08,color:'#4A7AB5'},itemStyle:{color:'#4A7AB5'}}]
  }));

  // 4. Top stakers
  var top = await q("SELECT authority, round(sum(amount_sol), 1) as vol FROM marinade_ops FINAL WHERE action IN ('deposit','deposit_stake_account') AND amount_sol > 0 GROUP BY authority ORDER BY vol DESC LIMIT 10");
  var names = top.map(function(r){return r.authority.slice(0,4)+'..'+r.authority.slice(-4)}).reverse();
  var vals = top.map(function(r){return +r.vol}).reverse();
  echarts.init(document.getElementById('c-top')).setOption(Object.assign(termOpts(), {
    grid:{left:64,right:56,top:4,bottom:16},
    xAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmtSol(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    yAxis:{type:'category',data:names,axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#ccc',fontSize:9,fontFamily:'Consolas,monospace'}},
    series:[{type:'bar',data:vals,barMaxWidth:10,itemStyle:{color:'#3D7A6B'},
      label:{show:true,position:'right',color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(p){return fmtSol(p.value)}}}]
  }));

  // 5. Hourly activity
  var hourly = await q("SELECT toHour(timestamp) as h, count() as cnt FROM marinade_ops FINAL GROUP BY h ORDER BY h");
  echarts.init(document.getElementById('c-hourly')).setOption(Object.assign(termOpts(), {
    grid:{left:40,right:8,top:8,bottom:24},
    xAxis:{type:'category',data:hourly.map(function(r){return r.h+'h'}),axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace'}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#666',fontSize:9,fontFamily:'Consolas,monospace',formatter:function(v){return fmt(v)}},splitLine:{lineStyle:{color:'#1a1a1a',type:'dashed'}}},
    series:[{type:'bar',data:hourly.map(function(r){return +r.cnt}),barMaxWidth:10,itemStyle:{color:'#2B4F7E'}}]
  }));

  window.__DASHBOARD_READY__ = true;
}

init().catch(function(e){console.error(e);});
</script>
</body>
</html>
