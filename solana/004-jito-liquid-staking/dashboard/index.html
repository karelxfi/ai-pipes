<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>JITO MEV TIPS — Validator Reward Distribution Claims</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      color: #cccccc;
      font-family: 'Consolas', 'SF Mono', 'Source Code Pro', 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.3;
      width: 1200px;
      height: 675px;
      overflow: hidden;
    }
    .header {
      padding: 8px 12px 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid #1a1a1a;
    }
    .header-left h1 {
      font-size: 11px;
      font-weight: normal;
      color: #4A7AB5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .header-left .angle {
      font-size: 10px;
      color: #666;
      margin-top: 1px;
    }
    .stats { display: flex; gap: 16px; }
    .stat { text-align: right; }
    .stat-value {
      font-size: 16px;
      font-weight: normal;
      color: #ffffff;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-feature-settings: 'tnum';
    }
    .stat-label {
      font-size: 9px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      height: calc(675px - 48px - 18px);
    }
    .panel {
      border: 1px solid #1a1a1a;
      padding: 8px;
      background: #0a0a0a;
      position: relative;
    }
    .chart { width: 100%; height: 100%; }
    .footer {
      padding: 3px 12px;
      font-size: 9px;
      color: #444;
      text-align: center;
      border-top: 1px solid #1a1a1a;
    }
    .error-msg {
      padding: 40px;
      color: #ff4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>JITO MEV TIPS — Validator Reward Distribution</h1>
      <div class="angle">Merkle-based tip claims from Jito Tip Distribution program on Solana</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="totalClaims">—</div>
        <div class="stat-label">Total Claims</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalSol">—</div>
        <div class="stat-label">Total SOL</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="uniqueTDAs">—</div>
        <div class="stat-label">Tip Accounts</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="period">—</div>
        <div class="stat-label">Period</div>
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="panel"><div id="chart1" class="chart"></div></div>
    <div class="panel"><div id="chart2" class="chart"></div></div>
    <div class="panel"><div id="chart3" class="chart"></div></div>
    <div class="panel"><div id="chart4" class="chart"></div></div>
  </div>
  <div class="footer">Built with ai-pipes + SQD Pipes SDK | github.com/karelxfi | x.com/karelxfi</div>

  <script>
    var CH = 'http://localhost:8123/?user=default&password=password&database=jito_tips&default_format=JSON';
    var PALETTE = ['#1E3A5F','#2B4F7E','#1A3050','#3D6494','#4A7AB5','#2E5480','#5A8ABF','#1F4470','#3B6A9E','#274D73'];

    function q(sql) {
      return fetch(CH, { method: 'POST', body: sql })
        .then(function(r) { return r.json(); })
        .then(function(j) { return j.data; });
    }

    function terminalOpts(title) {
      return {
        backgroundColor: 'transparent',
        title: {
          text: title.toUpperCase(),
          textStyle: { color: '#666', fontSize: 10, fontWeight: 'normal', fontFamily: 'Consolas, SF Mono, monospace' },
          left: 8, top: 4
        },
        textStyle: { color: '#666', fontFamily: 'Consolas, SF Mono, Source Code Pro, monospace' },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#333',
          textStyle: { color: '#ccc', fontSize: 10, fontFamily: 'Consolas, monospace' },
          padding: [4, 8]
        },
        grid: { left: 56, right: 12, top: 28, bottom: 28 },
        animation: false
      };
    }

    function fmt(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(n);
    }

    function fmtSol(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return n.toFixed(1);
    }

    Promise.all([
      q("SELECT toDate(timestamp) as day, count() as claims, round(sum(amount_sol), 2) as sol FROM tip_claims GROUP BY day ORDER BY day"),
      q("SELECT toDate(timestamp) as day, round(sum(amount_sol), 2) as sol FROM tip_claims GROUP BY day ORDER BY day"),
      q("SELECT substring(tip_distribution_account, 1, 8) as tda_short, tip_distribution_account as tda, round(sum(amount_sol), 2) as sol, count() as claims FROM tip_claims GROUP BY tda, tda_short ORDER BY sol DESC LIMIT 15"),
      q("SELECT toStartOfHour(timestamp) as hour, count() as claims FROM tip_claims GROUP BY hour ORDER BY hour"),
      q("SELECT count() as cnt, round(sum(amount_sol), 2) as total_sol, uniq(tip_distribution_account) as tdas, min(timestamp) as min_ts, max(timestamp) as max_ts FROM tip_claims"),
    ]).then(function(results) {
      var daily = results[0];
      var dailySol = results[1];
      var topTDAs = results[2];
      var hourly = results[3];
      var stats = results[4][0];

      document.getElementById('totalClaims').textContent = fmt(Number(stats.cnt));
      document.getElementById('totalSol').textContent = fmtSol(Number(stats.total_sol)) + ' SOL';
      document.getElementById('uniqueTDAs').textContent = fmt(Number(stats.tdas));
      var minD = stats.min_ts.slice(0, 10);
      var maxD = stats.max_ts.slice(0, 10);
      document.getElementById('period').textContent = minD + ' \u2192 ' + maxD;

      // Chart 1: Daily claim count
      var c1 = echarts.init(document.getElementById('chart1'));
      c1.setOption(Object.assign(terminalOpts('Daily Tip Claims'), {
        xAxis: {
          type: 'category',
          data: daily.map(function(d) { return d.day; }),
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return v.slice(5); } },
          splitLine: { show: false }
        },
        yAxis: {
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return fmt(v); } },
          splitLine: { lineStyle: { color: '#1a1a1a', type: 'dashed' } }
        },
        series: [{ type: 'bar', data: daily.map(function(d) { return Number(d.claims); }), itemStyle: { color: '#2B4F7E' }, barMaxWidth: 12 }]
      }));

      // Chart 2: Daily SOL distributed
      var c2 = echarts.init(document.getElementById('chart2'));
      c2.setOption(Object.assign(terminalOpts('Daily SOL Distributed'), {
        xAxis: {
          type: 'category',
          data: dailySol.map(function(d) { return d.day; }),
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return v.slice(5); } },
          splitLine: { show: false }
        },
        yAxis: {
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return fmtSol(v); } },
          splitLine: { lineStyle: { color: '#1a1a1a', type: 'dashed' } }
        },
        series: [{ type: 'bar', data: dailySol.map(function(d) { return Number(d.sol); }), itemStyle: { color: '#4AF6C3' }, barMaxWidth: 12 }]
      }));

      // Chart 3: Top tip distribution accounts
      var c3 = echarts.init(document.getElementById('chart3'));
      var tdaLabels = topTDAs.map(function(d) { return d.tda_short + '...'; }).reverse();
      var tdaSol = topTDAs.map(function(d) { return Number(d.sol); }).reverse();
      c3.setOption(Object.assign(terminalOpts('Top Tip Distribution Accounts (SOL)'), {
        grid: { left: 80, right: 48, top: 28, bottom: 12 },
        xAxis: {
          type: 'value',
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return fmtSol(v); } },
          splitLine: { lineStyle: { color: '#1a1a1a', type: 'dashed' } }
        },
        yAxis: {
          type: 'category', data: tdaLabels,
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace' }
        },
        series: [{
          type: 'bar', data: tdaSol,
          itemStyle: { color: function(params) { return PALETTE[params.dataIndex % PALETTE.length]; } },
          barMaxWidth: 14,
          label: { show: true, position: 'right', formatter: function(p) { return fmtSol(p.value) + ' SOL'; }, color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace' }
        }]
      }));

      // Chart 4: Hourly claim activity
      var c4 = echarts.init(document.getElementById('chart4'));
      c4.setOption(Object.assign(terminalOpts('Hourly Claim Activity'), {
        xAxis: {
          type: 'category',
          data: hourly.map(function(d) { return d.hour; }),
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return v.slice(5, 13); } },
          splitLine: { show: false }
        },
        yAxis: {
          axisLine: { show: false }, axisTick: { show: false },
          axisLabel: { color: '#666', fontSize: 9, fontFamily: 'Consolas, monospace', formatter: function(v) { return fmt(v); } },
          splitLine: { lineStyle: { color: '#1a1a1a', type: 'dashed' } }
        },
        series: [{
          type: 'line',
          data: hourly.map(function(d) { return Number(d.claims); }),
          lineStyle: { width: 1.5, color: '#4A7AB5' },
          showSymbol: false,
          areaStyle: { opacity: 0.08, color: '#4A7AB5' }
        }]
      }));

      window.__DASHBOARD_READY__ = true;
    }).catch(function(err) {
      console.error('Dashboard error:', err);
      var errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.textContent = 'Error loading data: ' + err.message;
      document.body.appendChild(errorDiv);
    });
  </script>
</body>
</html>
